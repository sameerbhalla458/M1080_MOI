<!DOCTYPE html>
<html lang="en">
<head>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #080f1e; }
  input[type=range] { cursor: pointer; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: #0d1425; }
  ::-webkit-scrollbar-thumb { background: #1e2d47; border-radius: 3px; }

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo } = React;

// ─── Coordinate Frame: X = forward, Y = lateral (right), Z = up (RH) ─────────
const DEG = Math.PI / 180;

// ─── De Leva (1996) Male Segment Parameters ───────────────────────────────────
// Source: De Leva, P. (1996). Adjustments to Zatsiorsky-Seluyanov's segment
//   inertia parameters. Journal of Biomechanics, 29(9), 1223–1230.
//   DOI: 10.1016/0021-9290(95)00178-6
//
// Derived from: Zatsiorsky & Seluyanov (1983/1985) in-vivo gamma-ray scanning
//   data, recalculated by De Leva to use more practical anatomical landmarks.
//   Sample: adult males (n=100), mean age 28y, mass 73kg, height 174cm.
//
// Parameters:
//   mf  = segment mass / total body mass
//   lf  = segment length / total body height
//   cf  = CoM distance from PROXIMAL end / segment length
//   k   = radius of gyration (transverse axis) / segment length
//
// Segment length definitions (proximal → distal):
//   head  : vertex → mid-cervical (C7-T1)
//   trunk : C7-T1  → mid-hip (greater trochanters)
//   uArm  : glenohumeral → elbow (lateral epicondyle)
//   fArm  : elbow → wrist (radial / ulnar styloids)
//   hand  : wrist → fingertip III
//   thigh : greater trochanter → knee (lateral femoral epicondyle)
//   shank : knee → ankle (lateral malleolus)
//   foot  : heel → toe II
const SEG_DATA = {
  //           mf       lf      cf      k      label
  head:  { mf:0.0694, lf:0.130, cf:0.500, k:0.303, label:"Head & Neck"   },
  trunk: { mf:0.4346, lf:0.300, cf:0.500, k:0.328, label:"Trunk"         },
  uArm:  { mf:0.0271, lf:0.170, cf:0.577, k:0.285, label:"Upper Arms ×2" },
  fArm:  { mf:0.0162, lf:0.146, cf:0.457, k:0.276, label:"Forearms ×2"   },
  hand:  { mf:0.0061, lf:0.058, cf:0.790, k:0.513, label:"Hands ×2"      },
  thigh: { mf:0.1000, lf:0.245, cf:0.410, k:0.329, label:"Thighs ×2"     },
  shank: { mf:0.0465, lf:0.246, cf:0.446, k:0.255, label:"Lower Legs ×2"     },
  foot:  { mf:0.0145, lf:0.152, cf:0.401, k:0.257, label:"Feet ×2"       },
};

// ─── Dumas, Chèze & Verriest (2007) Male Segment Parameters ──────────────────
// Source: Dumas, R., Chèze, L., & Verriest, J.P. (2007).
//   Adjustments to McConville et al. and Young et al. body segment inertial
//   parameters. Journal of Biomechanics, 40(3), 543–553.
//   DOI: 10.1016/j.jbiomech.2006.10.016
//
// Derived from: McConville, J.T., Churchill, T.D., Kaleps, I., Clauser, C.E.,
//   & Cuzzi, J. (1980). Anthropometric relationships of body and body segment
//   moments of inertia. AFAMRL Technical Report 80-119, Wright-Patterson AFB.
//   Measured on n=31 living adult males using stereophotogrammetry.
//   Dumas re-expressed with joint-centre landmarks & standard biomechanics axes.
//
// Same parameter definitions as De Leva (mf, lf, cf, k) for direct comparison.
const SEG_DATA_DUMAS = {
  head:  { mf:0.0668, lf:0.1307, cf:0.5002, k:0.3030, label:"Head & Neck"   },
  trunk: { mf:0.4257, lf:0.3060, cf:0.4964, k:0.3280, label:"Trunk"         },
  uArm:  { mf:0.0255, lf:0.1859, cf:0.5722, k:0.2690, label:"Upper Arms ×2" },
  fArm:  { mf:0.0138, lf:0.1460, cf:0.4574, k:0.2610, label:"Forearms ×2"   },
  hand:  { mf:0.0056, lf:0.0572, cf:0.7474, k:0.5310, label:"Hands ×2"      },
  thigh: { mf:0.1028, lf:0.2450, cf:0.3720, k:0.3290, label:"Thighs ×2"     },
  shank: { mf:0.0427, lf:0.2460, cf:0.4416, k:0.2510, label:"Lower Legs ×2"     },
  foot:  { mf:0.0137, lf:0.1522, cf:0.4014, k:0.2570, label:"Feet ×2"       },
};

// ─── De Leva (1996) FEMALE Segment Parameters ────────────────────────────────
// Same source paper, Table 4 (females). n=100 living adult females.
// Mean age 28.6±5.7 yr, mass 61.9±8.8 kg, height 160.9±6.1 cm.
// Notable: thigh mf=0.1478 vs male 0.1000 (+48%) — largest inter-sex difference.
const SEG_DATA_F = {
  head:  { mf:0.0668, lf:0.1307, cf:0.5050, k:0.2710, label:"Head & Neck"   },
  trunk: { mf:0.4257, lf:0.2904, cf:0.4928, k:0.3070, label:"Trunk"         },
  uArm:  { mf:0.0255, lf:0.1730, cf:0.5754, k:0.2780, label:"Upper Arms ×2" },
  fArm:  { mf:0.0138, lf:0.1463, cf:0.4559, k:0.2610, label:"Forearms ×2"   },
  hand:  { mf:0.0056, lf:0.0581, cf:0.7474, k:0.5310, label:"Hands ×2"      },
  thigh: { mf:0.1478, lf:0.2454, cf:0.3713, k:0.3690, label:"Thighs ×2"     },
  shank: { mf:0.0481, lf:0.2459, cf:0.4415, k:0.2670, label:"Lower Legs ×2"     },
  foot:  { mf:0.0129, lf:0.1522, cf:0.4014, k:0.2990, label:"Feet ×2"       },
};

// ─── Dumas et al. (2007) FEMALE Segment Parameters ───────────────────────────
// Source data: Young, J.W., Chandler, R.F., Snow, C.C., Robinette, K.M.,
//   Zehner, G.F., & Lofberg, M.S. (1983). Anthropometric and mass distribution
//   characteristics of the adult female. FAA-AM-83-16, Oklahoma City.
//   Stereophotogrammetry on n=24 living adult females.
//   Dumas re-expressed with joint-centre landmarks (same paper, Table 3).
const SEG_DATA_DUMAS_F = {
  head:  { mf:0.0668, lf:0.1307, cf:0.5002, k:0.2710, label:"Head & Neck"   },
  trunk: { mf:0.4257, lf:0.3060, cf:0.4964, k:0.3070, label:"Trunk"         },
  uArm:  { mf:0.0255, lf:0.1730, cf:0.5722, k:0.2780, label:"Upper Arms ×2" },
  fArm:  { mf:0.0138, lf:0.1460, cf:0.4574, k:0.2610, label:"Forearms ×2"   },
  hand:  { mf:0.0056, lf:0.0572, cf:0.7474, k:0.5310, label:"Hands ×2"      },
  thigh: { mf:0.1478, lf:0.2450, cf:0.3720, k:0.3690, label:"Thighs ×2"     },
  shank: { mf:0.0481, lf:0.2460, cf:0.4416, k:0.2670, label:"Lower Legs ×2"     },
  foot:  { mf:0.0129, lf:0.1522, cf:0.4014, k:0.2990, label:"Feet ×2"       },
};

// ─── Dataset selector — returns correct pair based on gender ─────────────────
function getDatasets(gender) {
  return gender === 'F'
    ? { dl: SEG_DATA_F, du: SEG_DATA_DUMAS_F }
    : { dl: SEG_DATA,   du: SEG_DATA_DUMAS   };
}

// Lateral Y half-width (bilateral offset) as fraction of total height
// Shoulder half-width ~0.13H, hip half-width ~0.09H
const Y_FRAC = {
  head:0, trunk:0,
  uArm:0.13, fArm:0.13, hand:0.13,
  thigh:0.09, shank:0.09, foot:0.09,
};

// Weighted average coefficients
// De Leva: n=100 living subjects, gamma-ray (higher weight)
// Dumas:   n=31  living subjects, stereophotogrammetry
const W_DELEVA = 5, W_DUMAS = 2, W_TOTAL = W_DELEVA + W_DUMAS;

// ─── Kinematics (sagittal plane X–Z) ─────────────────────────────────────────
// Parameterised by segData so it works with both De Leva and Dumas datasets.
// sep = { legSep, armSep } — lateral half-width in metres (measured values, not fractions).
// All segment positions relative to HIP JOINT (trochanter). Angles in degrees.
function computePosture(M, H, ang, segData, sep) {
  const { trunkLean, thighAngle, kneeAngle, shoulderAngle, elbowAngle, footAngle } = ang;
  const { legSep, armSep } = sep;
  const SD = segData;
  const L = {};
  for (const [id, d] of Object.entries(SD)) L[id] = d.lf * H;

  // Trunk — lean: + = backward, - = forward
  const aT = trunkLean * DEG;
  const C7       = { x:-L.trunk*Math.sin(aT),              z: L.trunk*Math.cos(aT) };
  const trunkCom = { x:-L.trunk*SD.trunk.cf*Math.sin(aT),  z: L.trunk*SD.trunk.cf*Math.cos(aT) };

  // Head — sits on C7
  const headCom = { x:C7.x, z:C7.z + L.head*SD.head.cf };

  // Upper arm — shoulderAngle: 0=hanging, 90=horizontal fwd
  const pA = (-90 + shoulderAngle)*DEG;
  const elbowPos = { x:C7.x + L.uArm*Math.cos(pA),              z:C7.z + L.uArm*Math.sin(pA) };
  const uArmCom  = { x:C7.x + L.uArm*SD.uArm.cf*Math.cos(pA),  z:C7.z + L.uArm*SD.uArm.cf*Math.sin(pA) };

  // Forearm — interior elbowAngle: 180=straight, 90=bent
  const pF = pA + (180-elbowAngle)*DEG;
  const wristPos = { x:elbowPos.x + L.fArm*Math.cos(pF),              z:elbowPos.z + L.fArm*Math.sin(pF) };
  const fArmCom  = { x:elbowPos.x + L.fArm*SD.fArm.cf*Math.cos(pF),  z:elbowPos.z + L.fArm*SD.fArm.cf*Math.sin(pF) };
  const handCom  = { x:wristPos.x + L.hand*SD.hand.cf*Math.cos(pF),  z:wristPos.z + L.hand*SD.hand.cf*Math.sin(pF) };

  // Thigh — 0=horizontal fwd, +=knee above hip
  const pTh = thighAngle*DEG;
  const kneePos  = { x:L.thigh*Math.cos(pTh),             z:L.thigh*Math.sin(pTh) };
  const thighCom = { x:L.thigh*SD.thigh.cf*Math.cos(pTh), z:L.thigh*SD.thigh.cf*Math.sin(pTh) };

  // Shank — interior kneeAngle
  const pSh = (thighAngle+kneeAngle-180)*DEG;
  const anklePos = { x:kneePos.x + L.shank*Math.cos(pSh),              z:kneePos.z + L.shank*Math.sin(pSh) };
  const shankCom = { x:kneePos.x + L.shank*SD.shank.cf*Math.cos(pSh), z:kneePos.z + L.shank*SD.shank.cf*Math.sin(pSh) };

  // Foot — footAngle: 0=flat, +=toes up, -=toes down
  const pFt = footAngle*DEG;
  const footTip = { x:anklePos.x + L.foot*Math.cos(pFt),             z:anklePos.z + L.foot*Math.sin(pFt) };
  const footCom = { x:anklePos.x + L.foot*SD.foot.cf*Math.cos(pFt), z:anklePos.z + L.foot*SD.foot.cf*Math.sin(pFt) };

  const segs = [
    { id:"head",  com:headCom,  m:SD.head.mf *M, L:L.head,  k:SD.head.k,  y:0,       n:1 },
    { id:"trunk", com:trunkCom, m:SD.trunk.mf*M, L:L.trunk, k:SD.trunk.k, y:0,       n:1 },
    { id:"uArm",  com:uArmCom,  m:SD.uArm.mf *M, L:L.uArm,  k:SD.uArm.k,  y:armSep,  n:2 },
    { id:"fArm",  com:fArmCom,  m:SD.fArm.mf *M, L:L.fArm,  k:SD.fArm.k,  y:armSep,  n:2 },
    { id:"hand",  com:handCom,  m:SD.hand.mf *M, L:L.hand,  k:SD.hand.k,  y:armSep,  n:2 },
    { id:"thigh", com:thighCom, m:SD.thigh.mf*M, L:L.thigh, k:SD.thigh.k, y:legSep,  n:2 },
    { id:"shank", com:shankCom, m:SD.shank.mf*M, L:L.shank, k:SD.shank.k, y:legSep,  n:2 },
    { id:"foot",  com:footCom,  m:SD.foot.mf *M, L:L.foot,  k:SD.foot.k,  y:legSep,  n:2 },
  ];
  return { segs, joints:{ C7, elbowPos, wristPos, kneePos, anklePos, footTip }, L };
}

// ─── MOI Computation ─────────────────────────────────────────────────────────
// originX, originZ = position of the axis system origin, expressed in the
//   hip-centred frame (metres from trochanter).
// Segment CoM coordinates are also in hip frame, so displacement from origin:
//   dx = com.x - originX,  dz = com.z - originZ
//
// I_roll  (about X-axis): d^2 = dz^2 + y^2
// I_pitch (about Y-axis): d^2 = dx^2 + dz^2
// I_yaw   (about Z-axis): d^2 = dx^2 + y^2
function computeMOI(segs, originX, originZ) {
  let Iroll=0, Ipitch=0, Iyaw=0;
  const breakdown = [];
  for (const { id, com, m, L, k, y, n } of segs) {
    const dx = com.x - originX;
    const dz = com.z - originZ;
    const Iloc = (k*L)**2 * m;           // local MOI via De Leva Rg
    const ir = n*(Iloc + m*(dz*dz + y*y));
    const ip = n*(Iloc + m*(dx*dx + dz*dz));
    const iy = n*(Iloc + m*(dx*dx + y*y));
    Iroll+=ir; Ipitch+=ip; Iyaw+=iy;
    breakdown.push({ id, ir, ip, iy, totalMass:n*m });
  }
  return { Iroll, Ipitch, Iyaw, breakdown };
}

// SVG mapping: hip joint stays fixed in pixel space.
// Body frame: X→right, Z→up → SVG: px = hipPX + x*SCALE, py = hipPZ - z*SCALE
function toSVG(p, hipPX, hipPZ, scale) {
  return { x: hipPX + p.x*scale, y: hipPZ - p.z*scale };
}

// ─── Front View Component (Y–Z plane) ────────────────────────────────────────
// ─── Front View Component (Y–Z plane) ────────────────────────────────────────
// Represents a seated person viewed from the front.
// Key design decisions:
//   • Thighs diverge from hip CENTRE (Y=0) outward to knee (Y=±legSep).
//     This correctly shows the seated thigh going forward (X) and outward (Y).
//     When thighAngle≈0°, knee_Z ≈ hip_Z → thigh appears nearly horizontal ✓
//   • Forearm shown going slightly OUTWARD from elbow (in +Y), representing the
//     forearm going forward into the sagittal plane. Avoids the unnatural
//     upward-pointing forearm artifact that occurs when wrist_Z > elbow_Z.
//   • Seat line drawn at hip Z=0 as context for the viewer.
// ─── Front View Component (Y–Z plane) ────────────────────────────────────────
// PROJECTION RULE: Every point drawn at (Y, Z) where:
//   Y = lateral offset (legSep or armSep, 0 for midline) — from slider
//   Z = sagittal Z coordinate from kinematics — same value used for CoM dots
// This guarantees skeleton lines and CoM dots are always consistent.
//
// Thighs diverge from hip CENTRE (Y=0) to knee (Y=±legSep, Z=kneePos.z).
// This correctly represents the outward + forward spread of a seated thigh.
// ─── Front View Component (Y–Z plane) ────────────────────────────────────────
// PROJECTION: pure Y-Z orthographic (looking down +X axis / from the front).
//
// Bilateral segments (arms, legs): Y=±offset (constant along segment in 3D),
// Z from sagittal kinematics. CoM dots are thus at (Y=±s.y, Z=s.com.z) — the
// correct Y-Z projection of the 3D CoM position.
//
// THIGH: drawn from the ACTUAL hip joint (±legSep, 0) to knee (±legSep, kneeZ).
// This is anatomically correct — the hip joint IS at ±legSep laterally.
// When the thigh is nearly horizontal (thighAngle≈0), the thigh barely moves in Z
// and a depth hint arrow shows it extends forward into the page (X direction).
function FrontView({ joints, segs, legSep, armSep, originZ, L, dlData, panel, secTit, SCALE, SVG_H }) {
  const FW    = 220;
  const fHipZ = Math.round(SVG_H * 0.67);
  const fCX   = FW / 2;
  const fv    = (y, z) => ({ x: fCX + y*SCALE, y: fHipZ - z*SCALE });

  const { C7, kneePos, anklePos, footTip, elbowPos, wristPos } = joints;
  const headZ  = C7.z + L.head * dlData.head.cf;
  const headR2 = Math.max(L.head * 0.42 * SCALE, 10);
  const fOrig  = fv(0, originZ);

  // Midline
  const hipC  = fv(0, 0);
  const trk   = fv(0, C7.z);
  const headC = fv(0, headZ);

  // Arms
  const shlL = fv(-armSep, C7.z);       const shlR = fv( armSep, C7.z);
  const elbL = fv(-armSep, elbowPos.z);  const elbR = fv( armSep, elbowPos.z);
  const wriL = fv(-armSep, wristPos.z);  const wriR = fv( armSep, wristPos.z);

  // Legs — anchored at actual hip joint positions (±legSep, 0)
  const hipL = fv(-legSep, 0);          const hipR = fv( legSep, 0);
  const kneL = fv(-legSep, kneePos.z);  const kneR = fv( legSep, kneePos.z);
  const ankL = fv(-legSep, anklePos.z); const ankR = fv( legSep, anklePos.z);
  const ftL  = fv(-legSep, footTip.z);  const ftR  = fv( legSep, footTip.z);

  // Show depth hint when thigh is nearly horizontal (<18 px vertical travel)
  const thighVertPx  = Math.abs(kneL.y - hipL.y);
  const showDepth    = thighVertPx < 18;
  const dLen         = 13;

  return (
    <div style={{ ...panel, padding:"12px" }}>
      <div style={secTit}>FRONT  (Y–Z)</div>
      <svg width={FW} height={SVG_H}>

        {/* Grid */}
        {[-0.6,-0.3,0,0.3,0.6,0.9,1.2].map(v=>(
          <line key={"fgz"+v} x1={0} y1={fHipZ-v*SCALE} x2={FW} y2={fHipZ-v*SCALE}
                stroke="#0d1a2e" strokeWidth="1"/>
        ))}
        {[-0.3,0,0.3].map(v=>(
          <line key={"fgy"+v} x1={fCX+v*SCALE} y1={0} x2={fCX+v*SCALE} y2={SVG_H}
                stroke="#0d1a2e" strokeWidth="1"/>
        ))}

        <defs>
          <marker id="farrY" markerWidth="7" markerHeight="7" refX="3.5" refY="3.5" orient="auto">
            <path d="M0,1 L6,3.5 L0,6 Z" fill="#22c55e"/>
          </marker>
          <marker id="farrFZ" markerWidth="7" markerHeight="7" refX="3.5" refY="3.5" orient="auto">
            <path d="M0,1 L6,3.5 L0,6 Z" fill="#22c55e"/>
          </marker>
          <marker id="fdepth" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
            <path d="M0,1 L5,3 L0,5 Z" fill="#38bdf8" opacity="0.55"/>
          </marker>
        </defs>

        {/* Axis arrows */}
        <line x1={fOrig.x} y1={fOrig.y} x2={fOrig.x+48} y2={fOrig.y}
              stroke="#22c55e" strokeWidth="1.8" markerEnd="url(#farrY)"/>
        <line x1={fOrig.x} y1={fOrig.y} x2={fOrig.x} y2={fOrig.y-48}
              stroke="#22c55e" strokeWidth="1.8" markerEnd="url(#farrFZ)"/>
        <text x={fOrig.x+51} y={fOrig.y+4}  fontSize="9" fill="#22c55e" fontWeight="bold">Y</text>
        <text x={fOrig.x+3}  y={fOrig.y-51} fontSize="9" fill="#22c55e" fontWeight="bold">Z</text>
        <circle cx={fOrig.x} cy={fOrig.y} r={4} fill="#22c55e" opacity="0.9"/>

        {/* Seat reference line */}
        <line x1={fv(-legSep-0.06,0).x} y1={hipC.y} x2={fv(legSep+0.06,0).x} y2={hipC.y}
              stroke="#1e2d47" strokeWidth="1.5" strokeDasharray="5,3"/>

        {/* ── Trunk ── */}
        <line x1={hipC.x} y1={hipC.y} x2={trk.x} y2={trk.y}
              stroke="#f59e0b" strokeWidth="8" strokeLinecap="round"/>

        {/* ── Shoulder bar ── */}
        <line x1={shlL.x} y1={shlL.y} x2={shlR.x} y2={shlR.y}
              stroke="#fb923c" strokeWidth="5" strokeLinecap="round"/>

        {/* ── Arms ── */}
        <line x1={shlL.x} y1={shlL.y} x2={elbL.x} y2={elbL.y}
              stroke="#fb923c" strokeWidth="5" strokeLinecap="round"/>
        <line x1={elbL.x} y1={elbL.y} x2={wriL.x} y2={wriL.y}
              stroke="#fb923c" strokeWidth="3" strokeLinecap="round"/>
        <circle cx={elbL.x} cy={elbL.y} r={5} fill="#fb923c" stroke="#0d1425" strokeWidth="1.5"/>
        <line x1={shlR.x} y1={shlR.y} x2={elbR.x} y2={elbR.y}
              stroke="#fb923c" strokeWidth="5" strokeLinecap="round"/>
        <line x1={elbR.x} y1={elbR.y} x2={wriR.x} y2={wriR.y}
              stroke="#fb923c" strokeWidth="3" strokeLinecap="round"/>
        <circle cx={elbR.x} cy={elbR.y} r={5} fill="#fb923c" stroke="#0d1425" strokeWidth="1.5"/>

        {/* ── Hip bar — connects actual hip joints ── */}
        <line x1={hipL.x} y1={hipL.y} x2={hipR.x} y2={hipR.y}
              stroke="#f59e0b" strokeWidth="5" strokeLinecap="round"/>

        {/* ── Thighs — from hip joint (±legSep,0) to knee ── */}
        <line x1={hipL.x} y1={hipL.y} x2={kneL.x} y2={kneL.y}
              stroke="#38bdf8" strokeWidth="7" strokeLinecap="round"/>
        <line x1={hipR.x} y1={hipR.y} x2={kneR.x} y2={kneR.y}
              stroke="#38bdf8" strokeWidth="7" strokeLinecap="round"/>

        {/* Depth hint when thigh is mostly horizontal */}
        {showDepth && (<>
          <line x1={hipL.x+2} y1={hipL.y-3} x2={hipL.x+dLen} y2={hipL.y-dLen}
                stroke="#38bdf8" strokeWidth="1.2" strokeDasharray="3,2" opacity="0.55"
                markerEnd="url(#fdepth)"/>
          <line x1={hipR.x-2} y1={hipR.y-3} x2={hipR.x-dLen} y2={hipR.y-dLen}
                stroke="#38bdf8" strokeWidth="1.2" strokeDasharray="3,2" opacity="0.55"
                markerEnd="url(#fdepth)"/>
          <text x={fCX} y={hipC.y-dLen-7} fontSize="7" fill="#38bdf8"
                textAnchor="middle" opacity="0.65">thighs extend in +X</text>
        </>)}

        {/* ── Lower Legs ── */}
        <line x1={kneL.x} y1={kneL.y} x2={ankL.x} y2={ankL.y}
              stroke="#38bdf8" strokeWidth="4" strokeLinecap="round"/>
        <line x1={kneR.x} y1={kneR.y} x2={ankR.x} y2={ankR.y}
              stroke="#38bdf8" strokeWidth="4" strokeLinecap="round"/>

        {/* ── Feet ── */}
        <line x1={ankL.x} y1={ankL.y} x2={ftL.x} y2={ftL.y}
              stroke="#38bdf8" strokeWidth="3" strokeLinecap="round"/>
        <line x1={ankR.x} y1={ankR.y} x2={ftR.x} y2={ftR.y}
              stroke="#38bdf8" strokeWidth="3" strokeLinecap="round"/>

        {/* ── Hip joint dots (left, centre-pelvis, right) ── */}
        {[hipL, hipC, hipR].map((p,i)=>(
          <g key={"hip"+i}>
            <circle cx={p.x} cy={p.y} r={i===1?12:10} fill="rgba(0,0,0,0.35)"/>
            <circle cx={p.x} cy={p.y} r={i===1? 8: 6} fill="#f59e0b"
                    stroke="#0d1425" strokeWidth="1.5"/>
          </g>
        ))}
        <text x={hipC.x+13} y={hipC.y+4} fontSize="8" fill="#f59e0b" letterSpacing="1">HIP</text>

        {/* ── Knee and ankle joint dots ── */}
        {[{p:kneL,r:6},{p:kneR,r:6},{p:ankL,r:4},{p:ankR,r:4}].map((d,i)=>(
          <g key={"jt"+i}>
            <circle cx={d.p.x} cy={d.p.y} r={d.r+2} fill="rgba(0,0,0,0.35)"/>
            <circle cx={d.p.x} cy={d.p.y} r={d.r}   fill="#38bdf8"
                    stroke="#0d1425" strokeWidth="1.5"/>
          </g>
        ))}

        {/* ── Head ── */}
        <circle cx={headC.x} cy={headC.y} r={headR2+3} fill="rgba(0,0,0,0.3)"/>
        <circle cx={headC.x} cy={headC.y} r={headR2}   fill="#0d1a2e"
                stroke="#f59e0b" strokeWidth="5"/>

        {/* ── Segment CoM dots ──────────────────────────────────────────────
             (Y=±s.y, Z=s.com.z) — correct Y-Z projection of 3D CoM.
             For the thigh: Y=±legSep, Z=thighCom.z.  When thigh is near-
             horizontal, thighCom.z≈0 so dot appears at hip bar level on
             each side — which IS the correct projected position.             ── */}
        {segs.flatMap((s,idx)=>{
          const ys = s.n===2 ? [-s.y, s.y] : [0];
          return ys.map((yv,j)=>{
            const p = fv(yv, s.com.z);
            return (
              <g key={idx+"-"+j}>
                <circle cx={p.x} cy={p.y} r={6}   fill="rgba(16,185,129,0.12)"/>
                <circle cx={p.x} cy={p.y} r={2.8}  fill="rgba(16,185,129,0.95)"
                        stroke="rgba(16,185,129,0.3)" strokeWidth="1"/>
              </g>
            );
          });
        })}

        {/* ── Leg width bracket ── */}
        {(()=>{
          const lx=hipL.x, rx=hipR.x, by=hipC.y+22;
          return (<>
            <line x1={lx} y1={hipC.y+4}  x2={lx} y2={by+5}  stroke="#38bdf8" strokeWidth="1" opacity="0.5"/>
            <line x1={rx} y1={hipC.y+4}  x2={rx} y2={by+5}  stroke="#38bdf8" strokeWidth="1" opacity="0.5"/>
            <line x1={lx} y1={by+2}       x2={rx} y2={by+2}  stroke="#38bdf8" strokeWidth="1" opacity="0.5"/>
            <text x={(lx+rx)/2} y={by+12} fontSize="8" fill="#38bdf8" textAnchor="middle">
              {(legSep*200).toFixed(0)} cm
            </text>
          </>);
        })()}

        {/* ── Arm width bracket ── */}
        {(()=>{
          const lx=shlL.x, rx=shlR.x, ty=trk.y-20;
          return (<>
            <line x1={lx} y1={trk.y-4}  x2={lx} y2={ty-3}  stroke="#fb923c" strokeWidth="1" opacity="0.5"/>
            <line x1={rx} y1={trk.y-4}  x2={rx} y2={ty-3}  stroke="#fb923c" strokeWidth="1" opacity="0.5"/>
            <line x1={lx} y1={ty}        x2={rx} y2={ty}    stroke="#fb923c" strokeWidth="1" opacity="0.5"/>
            <text x={(lx+rx)/2} y={ty-5} fontSize="8" fill="#fb923c" textAnchor="middle">
              {(armSep*200).toFixed(0)} cm
            </text>
          </>);
        })()}

        {/* Legend */}
        <circle cx={FW-46} cy={SVG_H-14} r={3} fill="rgba(16,185,129,0.9)"/>
        <text   x={FW-40}  y={SVG_H-10}  fontSize="8" fill="#4ade80">CoM</text>
      </svg>
    </div>
  );
}


// ─── App ─────────────────────────────────────────────────────────────────────
function App() {
  const [mass,     setMass]     = useState(80);
  const [heightCm, setHeightCm] = useState(175);
  const [gender,   setGender]   = useState('M');  // 'M' or 'F'
  const [showRef,  setShowRef]  = useState(false);
  const [ang, setAng] = useState({
    trunkLean:5, thighAngle:0, kneeAngle:95,
    shoulderAngle:25, elbowAngle:90, footAngle:-10,
  });
  // Axis origin position in hip-centred frame [metres]
  const [originX, setOriginX] = useState(0.00);  // + = forward from hip
  const [originZ, setOriginZ] = useState(0.00);  // + = up from hip
  // Lateral separation — half-width in metres (centre to limb centreline)
  const [legSep, setLegSep] = useState(0.16);   // ~0.09×1.75m default
  const [armSep, setArmSep] = useState(0.23);   // ~0.13×1.75m default

  const height = heightCm / 100;
  const setAngle = (key, val) => setAng(prev => ({ ...prev, [key]: Number(val) }));

  // Select datasets based on gender
  const { dl: dlData, du: duData } = getDatasets(gender);

  // De Leva dataset (used for stick figure — primary reference)
  const { segs, joints, L } = useMemo(
    () => computePosture(mass, height, ang, dlData, { legSep, armSep }),
    [mass, height, ang, gender, legSep, armSep]
  );
  const moiDL = useMemo(
    () => computeMOI(segs, originX, originZ),
    [segs, originX, originZ]
  );

  // Dumas 2007 dataset
  const { segs: segsDumas } = useMemo(
    () => computePosture(mass, height, ang, duData, { legSep, armSep }),
    [mass, height, ang, gender, legSep, armSep]
  );
  const moiDumas = useMemo(
    () => computeMOI(segsDumas, originX, originZ),
    [segsDumas, originX, originZ]
  );

  // Weighted average (De Leva n=100 weight=5, Dumas n=31 weight=2)
  const moiAvg = useMemo(() => ({
    Iroll:  (W_DELEVA*moiDL.Iroll  + W_DUMAS*moiDumas.Iroll)  / W_TOTAL,
    Ipitch: (W_DELEVA*moiDL.Ipitch + W_DUMAS*moiDumas.Ipitch) / W_TOTAL,
    Iyaw:   (W_DELEVA*moiDL.Iyaw   + W_DUMAS*moiDumas.Iyaw)   / W_TOTAL,
  }), [moiDL, moiDumas]);

  // Keep moi pointing to De Leva for breakdown table & equation panel
  const moi = moiDL;

  // SVG layout — hip joint fixed at pixel (hipPX, hipPZ_px)
  const SVG_W=310, SVG_H=460;
  const hipPX=110, hipPZ_px=310, SCALE=195;
  const sv = p => toSVG(p, hipPX, hipPZ_px, SCALE);

  // Axis origin pixel position (moves with sliders)
  const originPx = { x: hipPX + originX*SCALE, y: hipPZ_px - originZ*SCALE };

  const { C7, elbowPos, wristPos, kneePos, anklePos, footTip } = joints;
  const headCenter = sv({ x:C7.x, z:C7.z + L.head*0.5 });
  const headR = Math.max(L.head*0.42*SCALE, 10);


  const lines = [
    { a:{x:0,z:0}, b:C7,       color:"#f59e0b", w:7 },
    { a:C7,         b:elbowPos, color:"#fb923c", w:4 },
    { a:elbowPos,   b:wristPos, color:"#fb923c", w:3 },
    { a:{x:0,z:0}, b:kneePos,  color:"#38bdf8", w:6 },
    { a:kneePos,    b:anklePos, color:"#38bdf8", w:4 },
    { a:anklePos,   b:footTip,  color:"#38bdf8", w:3 },
  ];
  const dots = [
    { p:{x:0,z:0}, r:7, fill:"#f59e0b", label:"HIP" },
    { p:C7,         r:5, fill:"#94a3b8" },
    { p:elbowPos,   r:5, fill:"#fb923c" },
    { p:wristPos,   r:3, fill:"#fb923c" },
    { p:kneePos,    r:6, fill:"#38bdf8" },
    { p:anklePos,   r:4, fill:"#38bdf8" },
  ];

  const postureSliders = [
    { key:"trunkLean",     label:"Trunk Lean",         min:-30, max:30,  hint:"+ back / - fwd"       },
    { key:"thighAngle",    label:"Thigh Angle",        min:-20, max:35,  hint:"+ knee above hip"     },
    { key:"kneeAngle",     label:"Knee Angle",         min:80,  max:165, hint:"interior"             },
    { key:"shoulderAngle", label:"Shoulder Elevation", min:0,   max:90,  hint:"0=down / 90=horiz"    },
    { key:"elbowAngle",    label:"Elbow Angle",        min:0,   max:160, hint:"0=straight / 90=bent" },
    { key:"footAngle",     label:"Foot Angle",         min:-30, max:30,  hint:"+ toes up / - down"   },

  return (
    <div style={{ fontFamily:"'Courier New',monospace", background:"#080f1e", color:"#e2e8f0", minHeight:"100vh", padding:"20px" }}>

      {/* ── Header ── */}
      <div style={{ marginBottom:"20px", borderBottom:"1px solid #1e2d47", paddingBottom:"12px" }}>
        <div style={{ display:"flex", alignItems:"baseline", gap:"16px", flexWrap:"wrap" }}>
          <span style={{ color:"#f59e0b", fontSize:"13px", letterSpacing:"4px", fontWeight:"bold" }}>M1080</span>
          <span style={{ color:"#94a3b8", fontSize:"11px", letterSpacing:"2px" }}>USER MOI ESTIMATOR</span>
          <span style={{ marginLeft:"auto", color:"#374151", fontSize:"9px" }}>De Leva (1996) · Segment Model</span>
        </div>
        <div style={{ color:"#374151", fontSize:"9px", marginTop:"4px", letterSpacing:"1px" }}>
          FRAME: X=FWD · Y=LATERAL · Z=UP (RH) &nbsp;|&nbsp; BILATERAL SYMMETRY · SEATED POSTURE · ±15% ACCURACY
        </div>
      </div>

      {/* ── Main row ── */}
      <div style={{ display:"flex", gap:"16px", flexWrap:"wrap" }}>

        {/* ── Stick Figure SVGs ── */}
        <div style={{ display:"flex", flexDirection:"column", gap:"10px", flexShrink:0 }}>

          {/* Sagittal + Front side by side */}
          <div style={{ display:"flex", gap:"10px" }}>

          {/* SAGITTAL VIEW (X–Z) */}
          <div style={{ ...panel, padding:"12px" }}>
          <div style={secTit}>SAGITTAL  (X–Z)</div>
          <svg width={SVG_W} height={SVG_H}>

            {/* Background grid */}
            {[-0.6,-0.3,0,0.3,0.6,0.9,1.2].map(v=>(
              <line key={"gz"+v} x1={0} y1={hipPZ_px-v*SCALE} x2={SVG_W} y2={hipPZ_px-v*SCALE} stroke="#111e33" strokeWidth="1"/>
            ))}
            {[-0.4,0,0.4,0.8].map(v=>(
              <line key={"gx"+v} x1={hipPX+v*SCALE} y1={0} x2={hipPX+v*SCALE} y2={SVG_H} stroke="#111e33" strokeWidth="1"/>
            ))}

            {/* Dashed line: hip → origin (only when offset) */}
            {(originX!==0||originZ!==0)&&(
              <line x1={hipPX} y1={hipPZ_px} x2={originPx.x} y2={originPx.y}

            )}

            {/* ── Moving axis arrows ── */}
            <defs>
              <marker id="arrX" markerWidth="7" markerHeight="7" refX="3.5" refY="3.5" orient="auto">
                <path d="M0,1 L6,3.5 L0,6 Z" fill="#22c55e"/>

            </defs>
            <line x1={originPx.x} y1={originPx.y} x2={originPx.x+70} y2={originPx.y}

            <line x1={originPx.x} y1={originPx.y} x2={originPx.x} y2={originPx.y-70}

            <text x={originPx.x+74} y={originPx.y+4}  fontSize="9" fill="#22c55e" fontWeight="bold">X</text>

            {lines.map((ln,i)=>{ const a=sv(ln.a), b=sv(ln.b); return (

            {/* Joint dots */}
            {dots.map((d,i)=>{ const {x,y}=sv(d.p); return (

              </g>

            {segs.map((s,i)=>{ const {x,y}=sv(s.com); return (

          </div>

          {/* FRONT VIEW (Y–Z) */}
          <FrontView

                  background: gender===g.v ? (g.v==='M'?"#1e3a5f":"#3b1f6b") : "#0d1425",

            </div>
          </div>

          {/* Axis Origin sliders */}
          <div style={{ ...panel, border:"1px solid #166534" }}>
            <div style={{ ...secTit, color:"#22c55e" }}>Axis Origin Position</div>
            <div style={{ fontSize:"9px", color:"#374151", marginBottom:"12px", lineHeight:"1.5" }}>

              MOI computed about X, Y, Z axes through this origin.
            </div>
            {[
              { label:"X origin", val:originX, set:setOriginX, hint:"+ = origin forward of hip",  color:"#22c55e" },

            ].map(inp=>(
              <div key={inp.label} style={{ marginBottom:"12px" }}>
                <div style={{ display:"flex", justifyContent:"space-between", marginBottom:"3px" }}>
                  <span style={{ fontSize:"10px", color:"#94a3b8" }}>
                    {inp.label}<span style={hint}>{inp.hint}</span>
                  </span>
                  <span style={{ color:"#e2e8f0", fontSize:"15px", fontWeight:"600", minWidth:"68px", textAlign:"right", fontFamily:"'Courier New',monospace" }}>
                    {inp.val>=0?"+":""}{inp.val.toFixed(2)}<span style={{ fontSize:"10px", color:"#64748b" }}> m</span>
                  </span>
                </div>
                <div style={{ display:"flex", alignItems:"center", gap:"6px" }}>
                  <span style={{ fontSize:"8px", color:"#4b5a70", minWidth:"30px" }}>-0.50</span>
                  <input type="range" min={-0.50} max={0.50} step={0.01} value={inp.val}
                         onChange={e=>inp.set(Number(e.target.value))} style={{ flex:1, accentColor:"#60a5fa" }}/>
                  <span style={{ fontSize:"8px", color:"#4b5a70", minWidth:"30px", textAlign:"right" }}>+0.50</span>

            </div>
          </div>

          {/* Posture sliders */}
          <div style={panel}>
            <div style={secTit}>Posture / Joint Angles</div>
            {postureSliders.map(sl=>(
              <div key={sl.key} style={{ marginBottom:"10px" }}>

      {/* ── MOI Equations Panel ── */}
      {(()=>{
        // ── Analytical derivation of I = m·(A·H² + B·H + C) per axis ──────────
        // Since all segment CoM positions scale with H (com = H·f(angles)),
        // and lateral offsets y = H·Y_FRAC, the full MOI expands to a
        // quadratic in H with mass M factored out:
        //
        //   I_axis = M · ( A·H²  +  B·H  +  C )
        //
        // where A, B, C are pure functions of posture angles and origin offset.
        // B and C vanish when origin is at hip (originX=originZ=0).
        //
        // Derivation per segment s:
        //   com_s = (H·fx_s, H·fz_s),  y_s = H·yf_s
        //   dx_s  = H·fx_s - originX,  dz_s = H·fz_s - originZ
        //   Iloc_s = (k_s·lf_s·H)²·mf_s·M
        //
        //   Roll  (about X): d² = dz_s² + y_s²
        //   Pitch (about Y): d² = dx_s² + dz_s²
        //   Yaw   (about Z): d² = dx_s² + y_s²

        let Ar=0, Br=0, Cr=0;  // Roll
        let Ap=0, Bp=0, Cp=0;  // Pitch
        let Ay=0, By=0, Cy=0;  // Yaw

        for (const seg of segs) {
          const fx  = seg.com.x / height;   // normalised x-position (com.x = H·fx)
          const fz  = seg.com.z / height;   // normalised z-position
          const yf  = seg.y     / height;   // normalised lateral half-offset
          const mf  = seg.m / mass;         // total mass fraction (accounts for n)
          const kl2 = (seg.k * (seg.L / height)) ** 2;  // (k·lf)²

          // Roll (X): d² = (H·fz - oZ)² + (H·yf)²
          Ar += seg.n * mf * (kl2 + fz*fz + yf*yf);
          Br += seg.n * mf * (-2*fz*originZ);
          Cr += seg.n * mf * (originZ*originZ);

          // Pitch (Y): d² = (H·fx - oX)² + (H·fz - oZ)²
          Ap += seg.n * mf * (kl2 + fx*fx + fz*fz);
          Bp += seg.n * mf * (-2*(fx*originX + fz*originZ));
          Cp += seg.n * mf * (originX*originX + originZ*originZ);

          // Yaw (Z): d² = (H·fx - oX)² + (H·yf)²
          Ay += seg.n * mf * (kl2 + fx*fx + yf*yf);
          By += seg.n * mf * (-2*fx*originX);
          Cy += seg.n * mf * (originX*originX);
        }

        const fmt4 = v => v.toFixed(4);
        const fmt2 = v => {
          const s = v >= 0 ? "+" : "−";
          return s + " " + Math.abs(v).toFixed(4);
        };

        // Check if B,C terms are negligible (origin at hip)
        const atHip = Math.abs(originX) < 0.001 && Math.abs(originZ) < 0.001;

        const sub  = { fontSize:"9px", verticalAlign:"sub" };
        const mono = { fontFamily:"'Courier New',monospace" };
        const axes = [
          { label:"ROLL",  sym:"I_xx", desc:"about X (forward)", color:"#f87171",
            A:Ar, B:Br, C:Cr, val:moi.Iroll  },
          { label:"PITCH", sym:"I_yy", desc:"about Y (lateral)", color:"#60a5fa",
            A:Ap, B:Bp, C:Cp, val:moi.Ipitch },
          { label:"YAW",   sym:"I_zz", desc:"about Z (up)",      color:"#4ade80",
            A:Ay, B:By, C:Cy, val:moi.Iyaw   },
        ];

        return (
          <div style={{ ...panel, marginTop:"16px", border:"1px solid #1e3a5f" }}>
            <div style={{ ...secTit, color:"#60a5fa" }}>

            </div>

            {/* General form */}
            <div style={{ padding:"10px 14px", background:"#0a1628", borderRadius:"6px",
                          border:"1px solid #1e3a5f", marginBottom:"14px", lineHeight:"1.8" }}>
              <div style={{ fontSize:"9px", color:"#374151", letterSpacing:"2px", marginBottom:"6px" }}>GENERAL FORM (posture-fixed)</div>
              <div style={{ ...mono, fontSize:"13px", color:"#e2e8f0" }}>
                <span style={{ color:"#60a5fa" }}>I</span>
                <span style={{ color:"#94a3b8" }}> = </span>
                <span style={{ color:"#e2e8f0" }}>m</span>
                <span style={{ color:"#94a3b8" }}> · ( </span>
                <span style={{ color:"#f59e0b", fontWeight:"bold" }}>A</span>
                <span style={{ color:"#94a3b8" }}> · H²</span>
                { !atHip && <><span style={{ color:"#94a3b8" }}>  +  </span>
                  <span style={{ color:"#a78bfa", fontWeight:"bold" }}>B</span>
                  <span style={{ color:"#94a3b8" }}> · H</span>
                  <span style={{ color:"#94a3b8" }}>  +  </span>
                  <span style={{ color:"#fb923c", fontWeight:"bold" }}>C</span></> }
                <span style={{ color:"#94a3b8" }}> )</span>
              </div>
              <div style={{ fontSize:"10px", color:"#374151", marginTop:"6px", lineHeight:"1.7" }}>
                m = user body mass [kg] · H = user height [m]
                { !atHip
                  ? " · A, B, C = posture & origin coefficients [m², m, 1]"
                  : " · A = posture coefficient [m²]  (B = C = 0 when origin is at hip)" }
              </div>
            </div>

            {/* Per-axis cards */}
            <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:"12px" }}>
              {axes.map(ax => {
                // Verify: m·(A·H²+B·H+C) should match computed moi value
                const check = mass * (ax.A*height*height + ax.B*height + ax.C);
                return (
                  <div key={ax.label} style={{ background:"#0d1425", borderRadius:"8px",
                      padding:"14px", border:"1px solid "+ax.color+"33" }}>

                    {/* Axis label */}
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"baseline", marginBottom:"10px" }}>
                      <span style={{ color:ax.color, fontSize:"11px", letterSpacing:"2px", fontWeight:"bold" }}>
                        {ax.label}
                      </span>
                      <span style={{ color:"#374151", fontSize:"9px" }}>{ax.sym} · {ax.desc}</span>
                    </div>

                    {/* Equation — single line */}
                    <div style={{ background:"#080f1e", borderRadius:"5px", padding:"10px 12px",
                                  marginBottom:"10px", ...mono }}>
                      {/* Line 1: I = m · ( A·H²  [+ B·H  + C] ) */}
                      <div style={{ fontSize:"11px", display:"flex", flexWrap:"wrap",
                                    alignItems:"baseline", gap:"3px", lineHeight:"1.9" }}>
                        <span style={{ color:ax.color }}>I</span>
                        <span style={{ color:"#4b5a70" }}>=</span>
                        <span style={{ color:"#94a3b8" }}>m ·</span>
                        <span style={{ color:"#4b5a70" }}>(</span>
                        <span style={{ color:"#f59e0b", fontWeight:"bold" }}>{fmt4(ax.A)}</span>
                        <span style={{ color:"#4b5a70" }}>·H²</span>
                        { !atHip && <>
                          <span style={{ color:"#4b5a70" }}>+</span>
                          <span style={{ color:"#a78bfa", fontWeight:"bold" }}>{fmt2(ax.B)}</span>
                          <span style={{ color:"#4b5a70" }}>·H</span>
                          <span style={{ color:"#4b5a70" }}>+</span>
                          <span style={{ color:"#fb923c", fontWeight:"bold" }}>{fmt2(ax.C)}</span>
                        </>}
                        <span style={{ color:"#4b5a70" }}>)</span>
                      </div>
                    </div>

                    {/* Coefficient key */}
                    <div style={{ fontSize:"9px", color:"#374151", lineHeight:"1.9", marginBottom:"10px" }}>
                      <div><span style={{ color:"#f59e0b" }}>A</span> = Σ n·mf·(k²·lf² + geom²) [m²]</div>
                      { !atHip && <>
                        <div><span style={{ color:"#a78bfa" }}>B</span> = −2·Σ n·mf·fz·oZ  [m]</div>
                        <div><span style={{ color:"#fb923c" }}>C</span> = Σ n·mf·(oX²+oZ²) [1]</div>
                      </>}
                    </div>

                    {/* Verification */}
                    <div style={{ borderTop:"1px solid #1e2d47", paddingTop:"8px" }}>
                      <div style={{ fontSize:"9px", color:"#374151", marginBottom:"3px" }}>
                        @ {mass} kg · {heightCm} cm:
                      </div>
                      <div style={{ ...mono, fontSize:"14px", color:ax.color, fontWeight:"bold" }}>
                        {ax.val.toFixed(3)} kg·m²
                      </div>
                      <div style={{ fontSize:"8px", color: Math.abs(check-ax.val)<0.001?"#22c55e":"#ef4444", marginTop:"2px" }}>
                        ✓ verified: {check.toFixed(3)}
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>

            {/* Usage note */}
            <div style={{ marginTop:"12px", padding:"10px 14px", background:"#0a1628",
                          borderRadius:"6px", border:"1px solid #1e3a5f",
                          fontSize:"10px", color:"#64748b", lineHeight:"1.8" }}>
              <span style={{ color:"#f59e0b" }}>Usage in M1080 session init:</span>
              &nbsp; Ask user for m and H → substitute into equation above → get I_roll, I_pitch, I_yaw as warm-start for RLS estimator.
              &nbsp; Coefficients <span style={{ color:"#f59e0b" }}>A</span>
              {!atHip && <>, <span style={{ color:"#a78bfa" }}>B</span>, <span style={{ color:"#fb923c" }}>C</span></>}
              &nbsp; are fixed for this posture & origin — re-compute only if sliders change.
            </div>
          </div>
        );
      })()}

      {/* ── References Panel ── */}
      <div style={{ ...panel, marginTop:"16px", border:"1px solid #1e2d47" }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:showRef?"14px":"0",
                      cursor:"pointer", userSelect:"none" }} onClick={()=>setShowRef(v=>!v)}>
          <div style={{ ...secTit, marginBottom:0, display:"flex", alignItems:"center", gap:"10px" }}>

          </div>
          <span style={{ fontSize:"9px", color:"#374151" }}>{showRef?"collapse":"expand"}</span>
        </div>

        {showRef&&(
          <div>

            {/* ══ De Leva 1996 ══ */}
            <div style={{ marginBottom:"20px" }}>
              <div style={{ fontSize:"9px", color:"#f59e0b", letterSpacing:"2px", marginBottom:"8px", borderBottom:"1px solid #1e2d47", paddingBottom:"4px" }}>
                [1] DE LEVA (1996) — {gender==='M'?"MALE (n=100)":"FEMALE (n=100)"}
              </div>
              <div style={{ padding:"12px", background:"#0d1425", borderRadius:"6px", marginBottom:"10px", lineHeight:"1.7" }}>
                <div style={{ color:"#e2e8f0", fontSize:"11px", marginBottom:"4px" }}>
                  De Leva, P. (1996). <span style={{ color:"#f59e0b" }}>Adjustments to Zatsiorsky-Seluyanov's segment inertia parameters.</span>
                </div>
                <div style={{ color:"#64748b", fontSize:"10px" }}>
                  <em>Journal of Biomechanics</em>, 29(9), 1223–1230. &nbsp;DOI: 10.1016/0021-9290(95)00178-6
                </div>
                <div style={{ marginTop:"8px", fontSize:"10px", color:"#94a3b8", lineHeight:"1.6" }}>
                  <strong style={{ color:"#60a5fa" }}>Source data:</strong> Zatsiorsky &amp; Seluyanov (1983–1990) in-vivo gamma-ray scanning on
                  living subjects. De Leva re-expressed using joint-centre landmarks for standard motion capture compatibility.
                </div>
                <div style={{ marginTop:"6px", fontSize:"10px", color:"#94a3b8", lineHeight:"1.6" }}>
                  {gender==='M'
                    ? <><strong style={{ color:"#60a5fa" }}>Male sample:</strong> n=100, age 28.6±6.0 yr, mass 73.0±9.2 kg, height 174.3±6.6 cm.</>
                    : <><strong style={{ color:"#c084fc" }}>Female sample:</strong> n=100, age 28.6±5.7 yr, mass 61.9±8.8 kg, height 160.9±6.1 cm.
                        &nbsp;Key difference from males: thigh mf=0.1478 vs male 0.1000 (+48%).</>
                  }
                  &nbsp;<strong style={{ color:"#60a5fa" }}>Measurement:</strong> Gamma-ray scanning (in-vivo).
                  &nbsp;<strong style={{ color:"#60a5fa" }}>Accuracy:</strong> ±10–15% whole-body MOI.
                </div>
              </div>
              <div style={{ overflowX:"auto" }}>
                <table style={{ width:"100%", fontSize:"10px", borderCollapse:"collapse" }}>
                  <thead>
                    <tr style={{ borderBottom:"1px solid #1e2d47" }}>
                      <th style={{ textAlign:"left",  padding:"4px 8px", color:"#64748b" }}>Segment</th>
                      <th style={{ textAlign:"right", padding:"4px 8px", color:"#f87171" }}>mf</th>
                      <th style={{ textAlign:"right", padding:"4px 8px", color:"#60a5fa" }}>lf</th>
                      <th style={{ textAlign:"right", padding:"4px 8px", color:"#4ade80" }}>cf</th>
                      <th style={{ textAlign:"right", padding:"4px 8px", color:"#f59e0b" }}>Rg/L</th>
                      <th style={{ textAlign:"left",  padding:"4px 8px", color:"#374151" }}>Proximal</th>
                      <th style={{ textAlign:"left",  padding:"4px 8px", color:"#374151" }}>Distal</th>
                    </tr>
                  </thead>
                  <tbody>
                    {[
                      { id:"head",  prox:"Vertex",              dist:"C7-T1 disc"               },
                      { id:"trunk", prox:"C7-T1 disc",          dist:"Mid-hip (trochanters)"     },
                      { id:"uArm",  prox:"Glenohumeral joint",  dist:"Lateral epicondyle"        },
                      { id:"fArm",  prox:"Lateral epicondyle",  dist:"Radial / ulnar styloids"   },
                      { id:"hand",  prox:"Wrist crease",        dist:"Fingertip III"             },
                      { id:"thigh", prox:"Greater trochanter",  dist:"Lat. femoral epicondyle"   },
                      { id:"shank", prox:"Lat. femoral epicon", dist:"Lateral malleolus"         },
                      { id:"foot",  prox:"Heel",                dist:"Toe II tip"                },
                    ].map((r,i)=>{ const d=dlData[r.id]; return (
                      <tr key={r.id} style={{ borderBottom:"1px solid #0d1425", background:i%2===0?"transparent":"rgba(255,255,255,0.01)" }}>
                        <td style={{ padding:"4px 8px", color:"#94a3b8" }}>{d.label}</td>
                        <td style={{ padding:"4px 8px", textAlign:"right", color:"#f87171" }}>{d.mf.toFixed(4)}</td>
                        <td style={{ padding:"4px 8px", textAlign:"right", color:"#60a5fa" }}>{d.lf.toFixed(3)}</td>
                        <td style={{ padding:"4px 8px", textAlign:"right", color:"#4ade80" }}>{d.cf.toFixed(3)}</td>
                        <td style={{ padding:"4px 8px", textAlign:"right", color:"#f59e0b" }}>{d.k.toFixed(3)}</td>
                        <td style={{ padding:"4px 8px", color:"#374151", fontSize:"9px" }}>{r.prox}</td>
                        <td style={{ padding:"4px 8px", color:"#374151", fontSize:"9px" }}>{r.dist}</td>
                      </tr>
                    );})}
                  </tbody>
                </table>
              </div>
            </div>

            {/* ══ Dumas 2007 ══ */}
            <div style={{ marginBottom:"16px" }}>
              <div style={{ fontSize:"9px", color:"#a78bfa", letterSpacing:"2px", marginBottom:"8px", borderBottom:"1px solid #1e2d47", paddingBottom:"4px" }}>
                [2] DUMAS, CHÈZE &amp; VERRIEST (2007) — {gender==='M'?"MALE (n=31)":"FEMALE (n=24)"}
              </div>
              <div style={{ padding:"12px", background:"#0d1425", borderRadius:"6px", marginBottom:"10px", lineHeight:"1.7" }}>
                <div style={{ color:"#e2e8f0", fontSize:"11px", marginBottom:"4px" }}>
                  Dumas, R., Chèze, L., &amp; Verriest, J.P. (2007).{" "}
                  <span style={{ color:"#a78bfa" }}>Adjustments to McConville et al. and Young et al. body segment inertial parameters.</span>
                </div>
                <div style={{ color:"#64748b", fontSize:"10px" }}>
                  <em>Journal of Biomechanics</em>, 40(3), 543–553. &nbsp;DOI: 10.1016/j.jbiomech.2006.10.016
                </div>
                <div style={{ marginTop:"8px", fontSize:"10px", color:"#94a3b8", lineHeight:"1.6" }}>
                  <strong style={{ color:"#a78bfa" }}>Source data:</strong> McConville et al. (1980) AFAMRL TR-80-119 (males) &amp;
                  Young et al. (1983) FAA-AM-83-16 (females) — stereophotogrammetry on living subjects.
                  Dumas re-expressed using joint-centre landmarks. Provides full inertia tensors including off-diagonal terms.
                </div>
                <div style={{ marginTop:"6px", fontSize:"10px", color:"#94a3b8", lineHeight:"1.6" }}>
                  {gender==='M'
                    ? <><strong style={{ color:"#a78bfa" }}>Male sample:</strong> n=31, age 27.0±4.1 yr, mass 73.7±9.5 kg, height 177.3±6.1 cm.</>
                    : <><strong style={{ color:"#c084fc" }}>Female sample:</strong> n=24, age 27.0±4.8 yr, mass 63.4±9.2 kg, height 165.0±6.1 cm.</>
                  }
                  &nbsp;<strong style={{ color:"#a78bfa" }}>Measurement:</strong> Stereophotogrammetry (in-vivo).
                  &nbsp;<strong style={{ color:"#a78bfa" }}>Key advantage:</strong> Full 3D inertia tensor with off-diagonal coupling terms.
                </div>
              </div>
              <div style={{ overflowX:"auto" }}>
                <table style={{ width:"100%", fontSize:"10px", borderCollapse:"collapse" }}>
                  <thead>
                    <tr style={{ borderBottom:"1px solid #1e2d47" }}>
                      <th style={{ textAlign:"left",  padding:"4px 8px", color:"#64748b" }}>Segment</th>
                      <th style={{ textAlign:"right", padding:"4px 8px", color:"#f87171" }}>mf</th>
                      <th style={{ textAlign:"right", padding:"4px 8px", color:"#60a5fa" }}>lf</th>
                      <th style={{ textAlign:"right", padding:"4px 8px", color:"#4ade80" }}>cf</th>
                      <th style={{ textAlign:"right", padding:"4px 8px", color:"#a78bfa" }}>Rg/L</th>
                      <th style={{ textAlign:"right", padding:"4px 8px", color:"#f59e0b" }}>Δmf vs DL</th>
                      <th style={{ textAlign:"right", padding:"4px 8px", color:"#f59e0b" }}>ΔRg/L vs DL</th>
                    </tr>
                  </thead>
                  <tbody>
                    {Object.keys(duData).map((id,i)=>{
                      const d  = duData[id];
                      const dl = dlData[id];
                      const dmf = ((d.mf-dl.mf)/dl.mf*100).toFixed(1);
                      const dk  = ((d.k -dl.k )/dl.k *100).toFixed(1);
                      return (
                        <tr key={id} style={{ borderBottom:"1px solid #0d1425", background:i%2===0?"transparent":"rgba(255,255,255,0.01)" }}>
                          <td style={{ padding:"4px 8px", color:"#94a3b8" }}>{d.label}</td>
                          <td style={{ padding:"4px 8px", textAlign:"right", color:"#f87171" }}>{d.mf.toFixed(4)}</td>
                          <td style={{ padding:"4px 8px", textAlign:"right", color:"#60a5fa" }}>{d.lf.toFixed(3)}</td>
                          <td style={{ padding:"4px 8px", textAlign:"right", color:"#4ade80" }}>{d.cf.toFixed(3)}</td>
                          <td style={{ padding:"4px 8px", textAlign:"right", color:"#a78bfa" }}>{d.k.toFixed(3)}</td>
                          <td style={{ padding:"4px 8px", textAlign:"right", color:Math.abs(dmf)<3?"#374151":"#f59e0b" }}>{dmf>0?"+":""}{dmf}%</td>
                          <td style={{ padding:"4px 8px", textAlign:"right", color:Math.abs(dk) <3?"#374151":"#f59e0b" }}>{dk >0?"+":""}{dk}%</td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
              <div style={{ marginTop:"8px", fontSize:"9px", color:"#374151", lineHeight:"1.6" }}>
                Δ columns show % difference from De Leva. Highlighted in amber where difference exceeds ±3%.
                Small differences validate that both datasets are consistent for normal-BMI adults.
              </div>
            </div>

            {/* Column key */}
            <div style={{ padding:"8px 12px", background:"#0d1425", borderRadius:"4px", fontSize:"9px", color:"#374151", lineHeight:"1.8" }}>
              <strong style={{ color:"#64748b" }}>Column key:</strong>
              &nbsp; mf = seg mass / body mass &nbsp;|&nbsp;
              lf = seg length / body height &nbsp;|&nbsp;
              cf = CoM from proximal end / seg length &nbsp;|&nbsp;
              Rg/L = transverse radius of gyration / seg length &nbsp;|&nbsp;
              I_local = (Rg/L · L)² · m
            </div>
          </div>
        )}
      </div>

      {/* Footer */}
      <div style={{ marginTop:"12px", display:"flex", justifyContent:"space-between", flexWrap:"wrap", gap:"6px" }}>
        <div style={{ fontSize:"9px", color:"#1e2d47" }}>[1] De Leva (1996) J Biomech 29(9):1223–30 &nbsp;|&nbsp; [2] Dumas et al. (2007) J Biomech 40(3):543–53</div>
        <div style={{ fontSize:"9px", color:"#1e2d47" }}>Frame: X=fwd · Y=lateral · Z=up (RH) · Origin offset from greater trochanter</div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

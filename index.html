const { useState, useMemo } = React;

// ─── Coordinate Frame: X = forward, Y = lateral (right), Z = up (RH) ─────────
const DEG = Math.PI / 180;
const KG_TO_LB = 2.20462;
const M_TO_IN  = 39.3701;
const CM_TO_IN = 0.393701;
const lbsToKg  = lb => lb / KG_TO_LB;
const kgToLbs  = kg => kg * KG_TO_LB;
const cmToFtIn = cm => {
  const tot = Math.round(cm * CM_TO_IN);
  const ft  = Math.floor(tot / 12);
  const ins = tot % 12;
  return ft + String.fromCharCode(39) + String(ins).padStart(2,"0") + String.fromCharCode(34);
};

// ─── De Leva (1996) Male Segment Parameters ───────────────────────────────────
// Source: De Leva, P. (1996). Adjustments to Zatsiorsky-Seluyanov's segment
//   inertia parameters. Journal of Biomechanics, 29(9), 1223–1230.
//   DOI: 10.1016/0021-9290(95)00178-6
//
// Derived from: Zatsiorsky & Seluyanov (1983/1985) in-vivo gamma-ray scanning
//   data, recalculated by De Leva to use more practical anatomical landmarks.
//   Sample: adult males (n=100), mean age 28y, mass 73kg, height 174cm.
//
// Parameters:
//   mf  = segment mass / total body mass
//   lf  = segment length / total body height
//   cf  = CoM distance from PROXIMAL end / segment length
//   k   = radius of gyration (transverse axis) / segment length
//
// Segment length definitions (proximal → distal):
//   head  : vertex → mid-cervical (C7-T1)
//   trunk : C7-T1  → mid-hip (greater trochanters)
//   uArm  : glenohumeral → elbow (lateral epicondyle)
//   fArm  : elbow → wrist (radial / ulnar styloids)
//   hand  : wrist → fingertip III
//   thigh : greater trochanter → knee (lateral femoral epicondyle)
//   shank : knee → ankle (lateral malleolus)
//   foot  : heel → toe II
const SEG_DATA = {
  //           mf       lf      cf      k      label
  head:  { mf:0.0694, lf:0.130, cf:0.500, k:0.303, label:"Head & Neck"   },
  trunk: { mf:0.4346, lf:0.300, cf:0.500, k:0.328, label:"Trunk"         },

  fArm:  { mf:0.0162, lf:0.146, cf:0.457, k:0.276, label:"Forearms ×2"   },
  hand:  { mf:0.0061, lf:0.058, cf:0.790, k:0.513, label:"Hands ×2"      },
  thigh: { mf:0.1000, lf:0.245, cf:0.410, k:0.329, label:"Thighs ×2"     },

};

// ─── Dumas, Chèze & Verriest (2007) Male Segment Parameters ──────────────────
// Source: Dumas, R., Chèze, L., & Verriest, J.P. (2007).

//
// Derived from: McConville, J.T., Churchill, T.D., Kaleps, I., Clauser, C.E.,
//   & Cuzzi, J. (1980). Anthropometric relationships of body and body segment
//   moments of inertia. AFAMRL Technical Report 80-119, Wright-Patterson AFB.
//   Measured on n=31 living adult males using stereophotogrammetry.
//   Dumas re-expressed with joint-centre landmarks & standard biomechanics axes.
//
// Same parameter definitions as De Leva (mf, lf, cf, k) for direct comparison.
const SEG_DATA_DUMAS = {

  trunk: { mf:0.4257, lf:0.3060, cf:0.4964, k:0.3280, label:"Trunk"         },
  uArm:  { mf:0.0255, lf:0.1859, cf:0.5722, k:0.2690, label:"Upper Arms ×2" },
  fArm:  { mf:0.0138, lf:0.1460, cf:0.4574, k:0.2610, label:"Forearms ×2"   },
  hand:  { mf:0.0056, lf:0.0572, cf:0.7474, k:0.5310, label:"Hands ×2"      },
  thigh: { mf:0.1028, lf:0.2450, cf:0.3720, k:0.3290, label:"Thighs ×2"     },
  shank: { mf:0.0427, lf:0.2460, cf:0.4416, k:0.2510, label:"Lower Legs ×2"     },
  foot:  { mf:0.0137, lf:0.1522, cf:0.4014, k:0.2570, label:"Feet ×2"       },
};

// ─── De Leva (1996) FEMALE Segment Parameters ────────────────────────────────
// Same source paper, Table 4 (females). n=100 living adult females.
// Mean age 28.6±5.7 yr, mass 61.9±8.8 kg, height 160.9±6.1 cm.
// Notable: thigh mf=0.1478 vs male 0.1000 (+48%) — largest inter-sex difference.
const SEG_DATA_F = {
  head:  { mf:0.0668, lf:0.1307, cf:0.5050, k:0.2710, label:"Head & Neck"   },
  trunk: { mf:0.4257, lf:0.2904, cf:0.4928, k:0.3070, label:"Trunk"         },
  uArm:  { mf:0.0255, lf:0.1730, cf:0.5754, k:0.2780, label:"Upper Arms ×2" },
  fArm:  { mf:0.0138, lf:0.1463, cf:0.4559, k:0.2610, label:"Forearms ×2"   },
  hand:  { mf:0.0056, lf:0.0581, cf:0.7474, k:0.5310, label:"Hands ×2"      },
  thigh: { mf:0.1478, lf:0.2454, cf:0.3713, k:0.3690, label:"Thighs ×2"     },
  shank: { mf:0.0481, lf:0.2459, cf:0.4415, k:0.2670, label:"Lower Legs ×2"     },
  foot:  { mf:0.0129, lf:0.1522, cf:0.4014, k:0.2990, label:"Feet ×2"       },
};

// ─── Dumas et al. (2007) FEMALE Segment Parameters ───────────────────────────
// Source data: Young, J.W., Chandler, R.F., Snow, C.C., Robinette, K.M.,
//   Zehner, G.F., & Lofberg, M.S. (1983). Anthropometric and mass distribution
//   characteristics of the adult female. FAA-AM-83-16, Oklahoma City.
//   Stereophotogrammetry on n=24 living adult females.
//   Dumas re-expressed with joint-centre landmarks (same paper, Table 3).
const SEG_DATA_DUMAS_F = {
  head:  { mf:0.0668, lf:0.1307, cf:0.5002, k:0.2710, label:"Head & Neck"   },
  trunk: { mf:0.4257, lf:0.3060, cf:0.4964, k:0.3070, label:"Trunk"         },
  uArm:  { mf:0.0255, lf:0.1730, cf:0.5722, k:0.2780, label:"Upper Arms ×2" },
  fArm:  { mf:0.0138, lf:0.1460, cf:0.4574, k:0.2610, label:"Forearms ×2"   },
  hand:  { mf:0.0056, lf:0.0572, cf:0.7474, k:0.5310, label:"Hands ×2"      },
  thigh: { mf:0.1478, lf:0.2450, cf:0.3720, k:0.3690, label:"Thighs ×2"     },
  shank: { mf:0.0481, lf:0.2460, cf:0.4416, k:0.2670, label:"Lower Legs ×2"     },
  foot:  { mf:0.0129, lf:0.1522, cf:0.4014, k:0.2990, label:"Feet ×2"       },
};

// ─── Dataset selector — returns correct pair based on gender ─────────────────
function getDatasets(gender) {
  return gender === 'F'
    ? { dl: SEG_DATA_F, du: SEG_DATA_DUMAS_F }
    : { dl: SEG_DATA,   du: SEG_DATA_DUMAS   };
}

// Lateral Y half-width (bilateral offset) as fraction of total height
// Shoulder half-width ~0.13H, hip half-width ~0.09H
const Y_FRAC = {
  head:0, trunk:0,
  uArm:0.13, fArm:0.13, hand:0.13,
  thigh:0.09, shank:0.09, foot:0.09,
};

// Weighted average coefficients
// De Leva: n=100 living subjects, gamma-ray (higher weight)
// Dumas:   n=31  living subjects, stereophotogrammetry
const W_DELEVA = 5, W_DUMAS = 2, W_TOTAL = W_DELEVA + W_DUMAS;

// ─── Kinematics (sagittal X–Z) + Frontal Y spread ────────────────────────────
// spread = { legSpread, armAbduction } — angles in degrees.
//
// Lateral Y positions are derived from anthropometry + spread angles:
//   Hip joint fixed at  hipHalfW  = 0.095 × H  (De Leva hip breadth proxy)
//   Shoulder fixed at   shlHalfW  = 0.130 × H  (De Leva shoulder breadth proxy)
//
// Leg spread angle θ_leg (0=legs together, 60=wide apart):
//   y_hip   = hipHalfW                               (hip joint, fixed)
//   y_knee  = hipHalfW + L.thigh × sin(θ_leg)        (knee diverges outward)
//   y_thigh = hipHalfW + L.thigh × cf_thigh × sin(θ_leg)   (thigh CoM)
//   y_shank = y_knee                                  (shank/foot hang from knee)
//
// Arm abduction angle θ_arm (0=arms at sides, 90=horizontal out):
//   y_shl  = shlHalfW                                (shoulder joint, fixed)
//   y_elbow= shlHalfW + L.uArm × sin(θ_arm)          (elbow diverges outward)
//   y_uArm = shlHalfW + L.uArm × cf_uArm × sin(θ_arm)(upper arm CoM)
//   y_fArm = y_elbow  (forearm/hand hang from elbow in frontal plane)
function computePosture(M, H, ang, segData) {
  const { trunkLean, thighAngle, kneeAngle, shoulderAngle, elbowAngle, footAngle,
          legSpread, kneeSpread, armAbduction, elbowSpread } = ang;
  const SD = segData;
  const L = {};
  for (const [id, d] of Object.entries(SD)) L[id] = d.lf * H;

  // ── Anthropometric lateral half-widths (proportional to height) ──────────────
  const hipHalfW = 0.095 * H;   // hip joint Y offset  (De Leva hip-breadth proxy)
  const shlHalfW = 0.130 * H;   // shoulder joint Y offset (De Leva shoulder-breadth proxy)

  // ── 3D spread angles (frontal plane) ──────────────────────────────────────
  // KEY PHYSICS: segment length from De Leva is the true 3D length.
  // When a segment spreads laterally by angle θ, its sagittal (X-Z) projections
  // are scaled by cos(θ) and its lateral (Y) component is L × sin(θ).
  // This preserves total 3D length:  √[(L·cosθ)²·(cos²α+sin²α) + (L·sinθ)²] = L ✓
  // Frontal spread: cumulative per joint chain, preserves 3D De Leva segment length
  const cosLeg = Math.cos(legSpread * DEG);
  const sinLeg = Math.sin(legSpread * DEG);
  const cosKne = Math.cos((legSpread + kneeSpread) * DEG);
  const sinKne = Math.sin((legSpread + kneeSpread) * DEG);
  const cosArm = Math.cos(armAbduction * DEG);
  const sinArm = Math.sin(armAbduction * DEG);
  const cosElb = Math.cos((armAbduction + elbowSpread) * DEG);
  const sinElb = Math.sin((armAbduction + elbowSpread) * DEG);

  // Lateral Y — each segment uses its own cumulative frontal angle
  const y_uArmCom  = shlHalfW + L.uArm * SD.uArm.cf * sinArm;
  const y_elbow    = shlHalfW + L.uArm * sinArm;
  const y_fArmCom  = y_elbow  + L.fArm * SD.fArm.cf * sinElb;
  const y_hand     = y_elbow  + L.fArm * sinElb;

  const y_thighCom = hipHalfW + L.thigh * SD.thigh.cf * sinLeg;
  const y_knee     = hipHalfW + L.thigh * sinLeg;
  const y_shankCom = y_knee   + L.shank * SD.shank.cf * sinKne;
  const y_ankle    = y_knee   + L.shank * sinKne;
  const y_footCom  = y_ankle  + L.foot  * SD.foot.cf  * sinKne;

  // Sagittal (X-Z): each segment scaled by its own cos(cumulative_frontal_angle)
  const aT = trunkLean * DEG;
  const C7       = { x:-L.trunk*Math.sin(aT),             z: L.trunk*Math.cos(aT) };
  const trunkCom = { x:-L.trunk*SD.trunk.cf*Math.sin(aT), z: L.trunk*SD.trunk.cf*Math.cos(aT) };
  const headCom  = { x:C7.x, z:C7.z + L.head*SD.head.cf };

  const pA = (-90 + shoulderAngle)*DEG;
  const elbowPos = { x:C7.x + L.uArm*Math.cos(pA)*cosArm,             z:C7.z + L.uArm*Math.sin(pA)*cosArm };
  const uArmCom  = { x:C7.x + L.uArm*SD.uArm.cf*Math.cos(pA)*cosArm, z:C7.z + L.uArm*SD.uArm.cf*Math.sin(pA)*cosArm };
  const pF = pA + (180-elbowAngle)*DEG;
  const wristPos = { x:elbowPos.x + L.fArm*Math.cos(pF)*cosElb,             z:elbowPos.z + L.fArm*Math.sin(pF)*cosElb };
  const fArmCom  = { x:elbowPos.x + L.fArm*SD.fArm.cf*Math.cos(pF)*cosElb, z:elbowPos.z + L.fArm*SD.fArm.cf*Math.sin(pF)*cosElb };
  const handCom  = { x:wristPos.x + L.hand*SD.hand.cf*Math.cos(pF)*cosElb, z:wristPos.z + L.hand*SD.hand.cf*Math.sin(pF)*cosElb };

  const pTh = thighAngle*DEG;
  const kneePos  = { x:L.thigh*Math.cos(pTh)*cosLeg,             z:L.thigh*Math.sin(pTh)*cosLeg };
  const thighCom = { x:L.thigh*SD.thigh.cf*Math.cos(pTh)*cosLeg, z:L.thigh*SD.thigh.cf*Math.sin(pTh)*cosLeg };
  const pSh = (thighAngle+kneeAngle-180)*DEG;
  const anklePos = { x:kneePos.x + L.shank*Math.cos(pSh)*cosKne,             z:kneePos.z + L.shank*Math.sin(pSh)*cosKne };
  const shankCom = { x:kneePos.x + L.shank*SD.shank.cf*Math.cos(pSh)*cosKne, z:kneePos.z + L.shank*SD.shank.cf*Math.sin(pSh)*cosKne };
  const pFt = footAngle*DEG;
  const footTip = { x:anklePos.x + L.foot*Math.cos(pFt)*cosKne,             z:anklePos.z + L.foot*Math.sin(pFt)*cosKne };
  const footCom = { x:anklePos.x + L.foot*SD.foot.cf*Math.cos(pFt)*cosKne,  z:anklePos.z + L.foot*SD.foot.cf*Math.sin(pFt)*cosKne };

  const segs = [
    { id:"head",  com:headCom,  m:SD.head.mf *M, L:L.head,  k:SD.head.k,  y:0,           n:1 },
    { id:"trunk", com:trunkCom, m:SD.trunk.mf*M, L:L.trunk, k:SD.trunk.k, y:0,           n:1 },
    { id:"uArm",  com:uArmCom,  m:SD.uArm.mf *M, L:L.uArm,  k:SD.uArm.k,  y:y_uArmCom,  n:2 },
    { id:"fArm",  com:fArmCom,  m:SD.fArm.mf *M, L:L.fArm,  k:SD.fArm.k,  y:y_fArmCom,  n:2 },
    { id:"hand",  com:handCom,  m:SD.hand.mf *M, L:L.hand,  k:SD.hand.k,  y:y_hand,      n:2 },
    { id:"thigh", com:thighCom, m:SD.thigh.mf*M, L:L.thigh, k:SD.thigh.k, y:y_thighCom,  n:2 },
    { id:"shank", com:shankCom, m:SD.shank.mf*M, L:L.shank, k:SD.shank.k, y:y_shankCom,  n:2 },
    { id:"foot",  com:footCom,  m:SD.foot.mf *M, L:L.foot,  k:SD.foot.k,  y:y_footCom,   n:2 },
  ];
  // Expose computed lateral positions for FrontView
  const lateralY = { hipHalfW, shlHalfW, y_knee, y_elbow, y_ankle, y_hand };
  return { segs, joints:{ C7, elbowPos, wristPos, kneePos, anklePos, footTip }, L, lateralY };
}

// ─── MOI Computation ─────────────────────────────────────────────────────────
// originX, originZ = position of the axis system origin, expressed in the
//   hip-centred frame (metres from trochanter).
// Segment CoM coordinates are also in hip frame, so displacement from origin:
//   dx = com.x - originX,  dz = com.z - originZ
//
// I_roll  (about X-axis): d^2 = dz^2 + y^2
// I_pitch (about Y-axis): d^2 = dx^2 + dz^2
// I_yaw   (about Z-axis): d^2 = dx^2 + y^2
function computeMOI(segs, originX, originY, originZ) {
  // originY: lateral offset of axis origin from body centreline
  // For bilateral segments (n=2), each side sits at ±y from centreline.
  // Distance from axis: dy_left = (-y - originY), dy_right = (y - originY)
  // Average squared distance = y² + originY² (cross term cancels by symmetry)
  // For midline segments (n=1, y=0): dy = -originY
  let Iroll=0, Ipitch=0, Iyaw=0;
  const breakdown = [];
  for (const { id, com, m, L, k, y, n } of segs) {
    const dx   = com.x - originX;
    const dz   = com.z - originZ;
    const Iloc = (k*L)**2 * m;
    // Y displacement² — bilateral average
    const dy2 = (n===2) ? (y*y + originY*originY) : (originY*originY);
    const ir = n*(Iloc + m*(dz*dz + dy2));
    const ip = n*(Iloc + m*(dx*dx + dz*dz));
    const iy = n*(Iloc + m*(dx*dx + dy2));
    Iroll+=ir; Ipitch+=ip; Iyaw+=iy;
    breakdown.push({ id, ir, ip, iy, totalMass:n*m });
  }
  return { Iroll, Ipitch, Iyaw, breakdown };
}

// SVG mapping: hip joint stays fixed in pixel space.
// Body frame: X→right, Z→up → SVG: px = hipPX + x*SCALE, py = hipPZ - z*SCALE
function toSVG(p, hipPX, hipPZ, scale) {
  return { x: hipPX + p.x*scale, y: hipPZ - p.z*scale };
}

// ─── DimLine (kept for possible future use — not rendered currently) ──────────
function DimLine({ x1, y1, x2, y2, label, off, color }) { return null; }

// ─── Top View Component (X–Y plane) ──────────────────────────────────────────
// Third-angle orthographic projection — looking DOWN the −Z axis.
//   X → right  (+X = forward)    Y ↓ down  (+Y = lateral right)
// Width = SVG_W matches Sagittal exactly → X grid aligns between views.
// hipX = 110 = same as sagittal hipPX → forward positions align.
// hipY = 150 → centred in 300px height, handles full slider range.
//
// All lines SOLID — no hidden-line dashes (keeps the figure readable).
// No dimension annotations — clean engineering schematic style.
function TopView({ joints, segs, lateralY, originX, originY, L, dlData, panel, secTit, SCALE, SVG_W, cog }) {
  const TH  = 300;
  const hipX = 110;
  const hipY = 150;
  const tv = (x, y) => ({ x: hipX + x*SCALE, y: hipY + y*SCALE });

  const { C7, kneePos, anklePos, footTip, elbowPos, wristPos } = joints;
  const { hipHalfW, shlHalfW, y_knee, y_elbow, y_ankle, y_hand } = lateralY;

  const headR  = Math.max(L.head * 0.38 * SCALE, 7);

  const origP = tv(originX, originY || 0);
  const hipC  = tv(0, 0);
  const hipL  = tv(0, -hipHalfW);   const hipR = tv(0,  hipHalfW);
  const c7p   = tv(C7.x, 0);
  const headP = tv(C7.x, 0);

  const shlL  = tv(C7.x, -shlHalfW);      const shlR = tv(C7.x,  shlHalfW);
  const elbL  = tv(elbowPos.x, -y_elbow);  const elbR = tv(elbowPos.x,  y_elbow);
  const wriL  = tv(wristPos.x, -y_hand);   const wriR = tv(wristPos.x,  y_hand);

  const kneL  = tv(kneePos.x, -y_knee);    const kneR = tv(kneePos.x,  y_knee);
  const ankL  = tv(anklePos.x, -y_ankle);  const ankR = tv(anklePos.x,  y_ankle);
  const ftL   = tv(footTip.x,  -y_ankle);  const ftR  = tv(footTip.x,   y_ankle);

  return (
    <div style={{ ...panel, padding:"12px" }}>
      <div style={secTit}>TOP  (X–Y)</div>
      <svg width={SVG_W} height={TH}>

        {/* Grid — same scale and X-offset as Sagittal */}
        {[-0.3,0,0.3,0.6,0.9,1.2].map(v=>(
          <line key={"tgx"+v} x1={hipX+v*SCALE} y1={0} x2={hipX+v*SCALE} y2={TH}
                stroke="#0d1a2e" strokeWidth="1"/>
        ))}
        {[-0.6,-0.3,0,0.3,0.6].map(v=>(
          <line key={"tgy"+v} x1={0} y1={hipY+v*SCALE} x2={SVG_W} y2={hipY+v*SCALE}
                stroke="#0d1a2e" strokeWidth="1"/>
        ))}

        {/* CL — sagittal plane Y=0 — chain-dot */}
        <line x1={0} y1={hipY} x2={SVG_W} y2={hipY}
              stroke="#22c55e" strokeWidth="0.9" strokeDasharray="14,4,2,4" opacity="0.4"/>
        <text x={SVG_W-6} y={hipY-4} fontSize="7" fill="#22c55e" textAnchor="end" opacity="0.45"
              fontFamily="Courier New,monospace">CL</text>

        {/* Axis arrows */}
        <defs>
          <marker id="tvX" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
            <path d="M0,0.5 L6,3.5 L0,6.5 Z" fill="#22c55e"/>
          </marker>
          <marker id="tvY" markerWidth="7" markerHeight="7" refX="3.5" refY="5" orient="auto">
            <path d="M0.5,0 L6.5,0 L3.5,6 Z" fill="#22c55e"/>
          </marker>
        </defs>
        <line x1={origP.x} y1={origP.y} x2={origP.x+44} y2={origP.y}
              stroke="#22c55e" strokeWidth="1.5" markerEnd="url(#tvX)"/>
        <text x={origP.x+48} y={origP.y+4} fontSize="9" fill="#22c55e" fontWeight="bold">X</text>
        <line x1={origP.x} y1={origP.y} x2={origP.x} y2={origP.y+44}
              stroke="#22c55e" strokeWidth="1.5" markerEnd="url(#tvY)"/>

// ─── Front View Component (Y–Z plane) ────────────────────────────────────────
// ─── Top View Component (X–Y plane) ──────────────────────────────────────────
// Engineering orthographic projection — looking DOWN the −Z axis.
//
// CONVENTIONS (US third-angle projection):
//   X → right  (forward = positive X, same as sagittal)
//   Y ↓ down   (lateral right = positive Y, toward front view)
//   Hidden lines (below plane of view) shown DASHED  — #38bdf8 shanks/feet
//   Visible lines shown SOLID
//   Center lines (sagittal plane Y=0) shown CHAIN-DOT
//   Dimension lines: perpendicular extension lines, arrow-terminated dim line
//
// All Y positions come from lateralY (computed in computePosture) ensuring
// full consistency with the front view and MOI calculation.
function FrontView({ joints, segs, lateralY, originZ, L, dlData, panel, secTit, SCALE, SVG_H, cog }) {
  const FW    = 220;
  const fHipZ = Math.round(SVG_H * 0.67);
  const fCX   = FW / 2;
  const fv    = (y, z) => ({ x: fCX + y*SCALE, y: fHipZ - z*SCALE });

  const { C7, kneePos, anklePos, footTip, elbowPos, wristPos } = joints;
  const { hipHalfW, shlHalfW, y_knee, y_elbow, y_hand, y_ankle } = lateralY;
  const headZ  = C7.z + L.head * dlData.head.cf;
  const headR2 = Math.max(L.head * 0.42 * SCALE, 10);
  const fOrig  = fv(0, originZ);

  // Midline
  const hipC = fv(0, 0);
  const trk  = fv(0, C7.z);
  const headC= fv(0, headZ);

  // Arms — shoulder at ±shlHalfW, elbow at ±y_elbow, wrist at ±y_hand
  // Both Y (lateral) AND Z (vertical from sagittal kinematics with cosArm factor)
  const shlL = fv(-shlHalfW, C7.z);     const shlR = fv( shlHalfW, C7.z);
  const elbL = fv(-y_elbow,  elbowPos.z); const elbR = fv( y_elbow,  elbowPos.z);
  const wriL = fv(-y_hand,   wristPos.z); const wriR = fv( y_hand,   wristPos.z);

  // Legs — hip joint at ±hipHalfW, knee at ±y_knee, ankle at ±y_ankle
  const hipL = fv(-hipHalfW, 0);         const hipR = fv( hipHalfW, 0);
  const kneL = fv(-y_knee,  kneePos.z);  const kneR = fv( y_knee,   kneePos.z);
  const ankL = fv(-y_ankle, anklePos.z); const ankR = fv( y_ankle,  anklePos.z);
  const ftL  = fv(-y_ankle, footTip.z);  const ftR  = fv( y_ankle,  footTip.z);

  return (
    <div style={{ ...panel, padding:"12px" }}>
      <div style={secTit}>FRONT  (Y–Z)</div>
      <svg width={FW} height={SVG_H}>

        {/* Grid */}
        {[-0.6,-0.3,0,0.3,0.6,0.9,1.2].map(v=>(
          <line key={"fgz"+v} x1={0} y1={fHipZ-v*SCALE} x2={FW} y2={fHipZ-v*SCALE} stroke="#0d1a2e" strokeWidth="1"/>
        ))}
        {[-0.3,0,0.3].map(v=>(
          <line key={"fgy"+v} x1={fCX+v*SCALE} y1={0} x2={fCX+v*SCALE} y2={SVG_H} stroke="#0d1a2e" strokeWidth="1"/>
        ))}

        <defs>
          <marker id="farrY" markerWidth="7" markerHeight="7" refX="3.5" refY="3.5" orient="auto">
            <path d="M0,1 L6,3.5 L0,6 Z" fill="#22c55e"/>
          </marker>
          <marker id="farrFZ" markerWidth="7" markerHeight="7" refX="3.5" refY="3.5" orient="auto">
            <path d="M0,1 L6,3.5 L0,6 Z" fill="#22c55e"/>
          </marker>

        </defs>

        {/* Axis arrows */}
        <line x1={fOrig.x} y1={fOrig.y} x2={fOrig.x+48} y2={fOrig.y} stroke="#22c55e" strokeWidth="1.8" markerEnd="url(#farrY)"/>
        <line x1={fOrig.x} y1={fOrig.y} x2={fOrig.x} y2={fOrig.y-48} stroke="#22c55e" strokeWidth="1.8" markerEnd="url(#farrFZ)"/>
        <text x={fOrig.x+51} y={fOrig.y+4}  fontSize="9" fill="#22c55e" fontWeight="bold">Y</text>
        <text x={fOrig.x+3}  y={fOrig.y-51} fontSize="9" fill="#22c55e" fontWeight="bold">Z</text>
        <circle cx={fOrig.x} cy={fOrig.y} r={4} fill="#22c55e" opacity="0.9"/>

        {/* Seat reference */}
        <line x1={fv(-(y_knee+0.06),0).x} y1={hipC.y} x2={fv(y_knee+0.06,0).x} y2={hipC.y} stroke="#1e2d47" strokeWidth="1.5" strokeDasharray="5,3"/>

        {/* Trunk */}
        <line x1={hipC.x} y1={hipC.y} x2={trk.x} y2={trk.y} stroke="#f59e0b" strokeWidth="8" strokeLinecap="round"/>

        {/* Shoulder bar */}
        <line x1={shlL.x} y1={shlL.y} x2={shlR.x} y2={shlR.y} stroke="#fb923c" strokeWidth="5" strokeLinecap="round"/>

        {/* Arms */}
        <line x1={shlL.x} y1={shlL.y} x2={elbL.x} y2={elbL.y} stroke="#fb923c" strokeWidth="5" strokeLinecap="round"/>
        <line x1={elbL.x} y1={elbL.y} x2={wriL.x} y2={wriL.y} stroke="#fb923c" strokeWidth="3" strokeLinecap="round"/>
        <circle cx={elbL.x} cy={elbL.y} r={5} fill="#fb923c" stroke="#0d1425" strokeWidth="1.5"/>
        <line x1={shlR.x} y1={shlR.y} x2={elbR.x} y2={elbR.y} stroke="#fb923c" strokeWidth="5" strokeLinecap="round"/>
        <line x1={elbR.x} y1={elbR.y} x2={wriR.x} y2={wriR.y} stroke="#fb923c" strokeWidth="3" strokeLinecap="round"/>
        <circle cx={elbR.x} cy={elbR.y} r={5} fill="#fb923c" stroke="#0d1425" strokeWidth="1.5"/>

        {/* Hip bar */}
        <line x1={hipL.x} y1={hipL.y} x2={hipR.x} y2={hipR.y} stroke="#f59e0b" strokeWidth="5" strokeLinecap="round"/>

        {/* Thighs */}
        <line x1={hipL.x} y1={hipL.y} x2={kneL.x} y2={kneL.y} stroke="#38bdf8" strokeWidth="7" strokeLinecap="round"/>
        <line x1={hipR.x} y1={hipR.y} x2={kneR.x} y2={kneR.y} stroke="#38bdf8" strokeWidth="7" strokeLinecap="round"/>



        {/* Shanks */}
        <line x1={kneL.x} y1={kneL.y} x2={ankL.x} y2={ankL.y} stroke="#38bdf8" strokeWidth="4" strokeLinecap="round"/>
        <line x1={kneR.x} y1={kneR.y} x2={ankR.x} y2={ankR.y} stroke="#38bdf8" strokeWidth="4" strokeLinecap="round"/>

        {/* Feet */}
        <line x1={ankL.x} y1={ankL.y} x2={ftL.x} y2={ftL.y} stroke="#38bdf8" strokeWidth="3" strokeLinecap="round"/>
        <line x1={ankR.x} y1={ankR.y} x2={ftR.x} y2={ftR.y} stroke="#38bdf8" strokeWidth="3" strokeLinecap="round"/>

        {/* Hip dots */}
        {[hipL, hipC, hipR].map((p,i)=>(
          <g key={"hip"+i}>
            <circle cx={p.x} cy={p.y} r={i===1?12:10} fill="rgba(0,0,0,0.35)"/>
            <circle cx={p.x} cy={p.y} r={i===1? 8: 6} fill="#f59e0b" stroke="#0d1425" strokeWidth="1.5"/>
          </g>
        ))}
        <text x={hipC.x+13} y={hipC.y+4} fontSize="8" fill="#f59e0b" letterSpacing="1">HIP</text>

        {/* Knee and ankle dots */}
        {[{p:kneL,r:6},{p:kneR,r:6},{p:ankL,r:4},{p:ankR,r:4}].map((d,i)=>(
          <g key={"jt"+i}>
            <circle cx={d.p.x} cy={d.p.y} r={d.r+2} fill="rgba(0,0,0,0.35)"/>
            <circle cx={d.p.x} cy={d.p.y} r={d.r}   fill="#38bdf8" stroke="#0d1425" strokeWidth="1.5"/>
          </g>
        ))}

        {/* Head */}
        <circle cx={headC.x} cy={headC.y} r={headR2+3} fill="rgba(0,0,0,0.3)"/>
        <circle cx={headC.x} cy={headC.y} r={headR2}   fill="#0d1a2e" stroke="#f59e0b" strokeWidth="5"/>

        {/* Segment CoM dots — Y from per-segment lateralY, Z from sagittal kinematics */}
        {segs.flatMap((s,idx)=>{
          const ys = s.n===2 ? [-s.y, s.y] : [0];
          return ys.map((yv,j)=>{
            const p = fv(yv, s.com.z);
            return (
              <g key={idx+"-"+j}>
                <circle cx={p.x} cy={p.y} r={6}   fill="rgba(16,185,129,0.12)"/>
                <circle cx={p.x} cy={p.y} r={2.8}  fill="rgba(16,185,129,0.95)" stroke="rgba(16,185,129,0.3)" strokeWidth="1"/>
              </g>
            );
          });
        })}

        {/* Body CoG — at Y=0 (symmetric), Z=cog.z */}
        {cog && (()=>{ const g=fv(0, cog.z); return (<>
          <circle cx={g.x} cy={g.y} r={9}  fill="rgba(250,204,21,0.15)"/>
          <circle cx={g.x} cy={g.y} r={5}  fill="#facc15" stroke="#0d1425" strokeWidth="1.5"/>
          <line x1={g.x-11} y1={g.y} x2={g.x+11} y2={g.y} stroke="#facc15" strokeWidth="1" opacity="0.7"/>
          <line x1={g.x}    y1={g.y-11} x2={g.x} y2={g.y+11} stroke="#facc15" strokeWidth="1" opacity="0.7"/>
          <text x={g.x+13} y={g.y+4} fontSize="8" fill="#facc15" fontFamily="Courier New,monospace">CoG</text>
        </>);})()}

        {/* Legend */}
        <circle cx={8} cy={SVG_H-22} r={3} fill="rgba(16,185,129,0.9)"/>
        <text x={14} y={SVG_H-18} fontSize="8" fill="#4ade80" fontFamily="Courier New,monospace">CoM</text>
        <circle cx={50} cy={SVG_H-22} r={4} fill="#facc15"/>
        <text x={57} y={SVG_H-18} fontSize="8" fill="#facc15" fontFamily="Courier New,monospace">CoG</text>
      </svg>
    </div>
  );
}




// ─── App ─────────────────────────────────────────────────────────────────────
function App() {
  const [mass,     setMass]     = useState(lbsToKg(176));
  const [heightCm, setHeightCm] = useState(Math.round(69*2.54));
  const [gender,   setGender]   = useState('M');  // 'M' or 'F'
  const [showRef,  setShowRef]  = useState(false);
  const [ang, setAng] = useState({
    trunkLean:25, thighAngle:17, kneeAngle:130,
    shoulderAngle:78, elbowAngle:167, footAngle:19,
    legSpread:0, kneeSpread:0, armAbduction:0, elbowSpread:0,
  });
  // Axis origin position in hip-centred frame [metres]
  const [originX, setOriginX] = useState(0.061);  // CoG X for default pose (verified)
  const [originY, setOriginY] = useState(0.00);
  const [originZ, setOriginZ] = useState(0.213);  // CoG Z for default pose (verified)


  const height = heightCm / 100;
  const setAngle = (key, val) => setAng(prev => ({ ...prev, [key]: Number(val) }));

  // Select datasets based on gender
  const { dl: dlData, du: duData } = getDatasets(gender);

  // De Leva dataset (used for stick figure — primary reference)
  const { segs, joints, L, lateralY } = useMemo(
    () => computePosture(mass, height, ang, dlData),
    [mass, height, ang, gender]
  );
  const moiDL = useMemo(
    () => computeMOI(segs, originX, originY, originZ),
    [segs, originX, originY, originZ]
  );

  // Dumas 2007 dataset
  const { segs: segsDumas } = useMemo(
    () => computePosture(mass, height, ang, duData),
    [mass, height, ang, gender]
  );
  const moiDumas = useMemo(
    () => computeMOI(segsDumas, originX, originY, originZ),
    [segsDumas, originX, originY, originZ]
  );

  // Weighted average (De Leva n=100 weight=5, Dumas n=31 weight=2)
  const moiAvg = useMemo(() => ({
    Iroll:  (W_DELEVA*moiDL.Iroll  + W_DUMAS*moiDumas.Iroll)  / W_TOTAL,
    Ipitch: (W_DELEVA*moiDL.Ipitch + W_DUMAS*moiDumas.Ipitch) / W_TOTAL,
    Iyaw:   (W_DELEVA*moiDL.Iyaw   + W_DUMAS*moiDumas.Iyaw)   / W_TOTAL,
  }), [moiDL, moiDumas]);

  // Keep moi pointing to De Leva for breakdown table & equation panel
  const moi = moiDL;

  // Body Centre of Gravity (CoG) — mass-weighted average of all segment CoMs
  // Uses De Leva segs; bilateral segments (n=2) count double mass, Y component cancels (symmetric).
  const cog = useMemo(() => {
    let totalM = 0, sumX = 0, sumZ = 0;
    for (const s of segs) {
      const m = s.m * s.n;   // total mass for this segment (×2 for bilateral)
      totalM += m;
      sumX   += m * s.com.x;
      sumZ   += m * s.com.z;
    }
    return totalM > 0 ? { x: sumX/totalM, z: sumZ/totalM } : { x:0, z:0 };
  }, [segs]);

  // SVG layout — hip joint fixed at pixel (hipPX, hipPZ_px)
  const SVG_W=310, SVG_H=460;
  const hipPX=110, hipPZ_px=310, SCALE=195;
  const sv = p => toSVG(p, hipPX, hipPZ_px, SCALE);

  // Axis origin pixel position (moves with sliders)
  const originPx = { x: hipPX + originX*SCALE, y: hipPZ_px - originZ*SCALE };

  const { C7, elbowPos, wristPos, kneePos, anklePos, footTip } = joints;
  const headCenter = sv({ x:C7.x, z:C7.z + L.head*0.5 });
  const headR = Math.max(L.head*0.42*SCALE, 10);


  const lines = [
    { a:{x:0,z:0}, b:C7,       color:"#f59e0b", w:7 },
    { a:C7,         b:elbowPos, color:"#fb923c", w:4 },
    { a:elbowPos,   b:wristPos, color:"#fb923c", w:3 },
    { a:{x:0,z:0}, b:kneePos,  color:"#38bdf8", w:6 },
    { a:kneePos,    b:anklePos, color:"#38bdf8", w:4 },
    { a:anklePos,   b:footTip,  color:"#38bdf8", w:3 },
  ];
  const dots = [
    { p:{x:0,z:0}, r:7, fill:"#f59e0b", label:"HIP" },
    { p:C7,         r:5, fill:"#94a3b8" },
    { p:elbowPos,   r:5, fill:"#fb923c" },
    { p:wristPos,   r:3, fill:"#fb923c" },
    { p:kneePos,    r:6, fill:"#38bdf8" },
    { p:anklePos,   r:4, fill:"#38bdf8" },
  ];

  // ── Pose presets ─────────────────────────────────────────────────────────
  const PRESETS = [
    { name:"DEFAULT",
      ang:{ trunkLean:25, thighAngle:17, kneeAngle:130, shoulderAngle:78, elbowAngle:167, footAngle:19,
            legSpread:0,  kneeSpread:0,  armAbduction:0,  elbowSpread:0 } },
  ];
  const postureSliders = [
    { key:"trunkLean",     label:"Trunk Lean",      min:-90,  max:90,  hint:"sagittal · + back"       },
    { key:"thighAngle",    label:"Thigh Angle",     min:-45,  max:120, hint:"sagittal · + knee up"    },
    { key:"legSpread",     label:"Leg Spread",      min:-30,  max:90,  hint:"frontal  · − = together" },
    { key:"kneeAngle",     label:"Knee Angle",      min:0,    max:175, hint:"sagittal · interior"     },
    { key:"kneeSpread",    label:"Knee Spread",     min:-30,  max:45,  hint:"frontal  · − = inward"   },
    { key:"shoulderAngle", label:"Shoulder Elev.",  min:-90,  max:180, hint:"sagittal · 0=down"       },
    { key:"armAbduction",  label:"Arm Abduction",   min:-45,  max:135, hint:"frontal  · − = inward"   },
    { key:"elbowAngle",    label:"Elbow Angle",     min:0,    max:175, hint:"sagittal · 0=straight"   },
    { key:"elbowSpread",   label:"Elbow Spread",    min:-30,  max:90,  hint:"frontal  · − = inward"   },
    { key:"footAngle",     label:"Foot Angle",      min:-60,  max:60,  hint:"sagittal · + toes up"    },
  ];

  const panel   = { background:"#111827", borderRadius:"8px", border:"1px solid #1e2d47", padding:"16px" };
  const secTit  = { fontFamily:"'Courier New',monospace", fontSize:"10px", letterSpacing:"2.5px",
                    color:"#f59e0b", textTransform:"uppercase", marginBottom:"12px" };
  const hint    = { fontSize:"9px", color:"#4b5a70", marginLeft:"6px" };

  return (
    <div style={{ fontFamily:"'Courier New',monospace", background:"#080f1e", color:"#e2e8f0", minHeight:"100vh", padding:"20px" }}>

      {/* ── Header ── */}
      <div style={{ marginBottom:"20px", borderBottom:"1px solid #1e2d47", paddingBottom:"12px" }}>
        <div style={{ display:"flex", alignItems:"baseline", gap:"16px", flexWrap:"wrap" }}>
          <span style={{ color:"#f59e0b", fontSize:"13px", letterSpacing:"4px", fontWeight:"bold" }}>M1080</span>
          <span style={{ color:"#94a3b8", fontSize:"11px", letterSpacing:"2px" }}>USER MOI ESTIMATOR</span>
          <span style={{ marginLeft:"auto", color:"#374151", fontSize:"9px" }}>De Leva (1996) · Segment Model</span>
        </div>
        <div style={{ color:"#374151", fontSize:"9px", marginTop:"4px", letterSpacing:"1px" }}>
          FRAME: X=FWD · Y=LATERAL · Z=UP (RH) &nbsp;|&nbsp; BILATERAL SYMMETRY · SEATED POSTURE · ±15% ACCURACY
        </div>
      </div>

      {/* ── Main row ── */}
      <div style={{ display:"flex", gap:"16px", flexWrap:"wrap" }}>

        {/* ── Stick Figure SVGs ── */}
        <div style={{ display:"flex", flexDirection:"column", gap:"10px", flexShrink:0 }}>

          {/* Sagittal + Front side by side */}
          <div style={{ display:"flex", gap:"10px" }}>

          {/* SAGITTAL VIEW (X–Z) */}
          <div style={{ ...panel, padding:"12px" }}>
          <div style={secTit}>SAGITTAL  (X–Z)</div>
          <svg width={SVG_W} height={SVG_H}>

            {/* Background grid */}
            {[-0.6,-0.3,0,0.3,0.6,0.9,1.2].map(v=>(
              <line key={"gz"+v} x1={0} y1={hipPZ_px-v*SCALE} x2={SVG_W} y2={hipPZ_px-v*SCALE} stroke="#111e33" strokeWidth="1"/>
            ))}
            {[-0.4,0,0.4,0.8].map(v=>(
              <line key={"gx"+v} x1={hipPX+v*SCALE} y1={0} x2={hipPX+v*SCALE} y2={SVG_H} stroke="#111e33" strokeWidth="1"/>
            ))}

            {/* Dashed line: hip → origin (only when offset) */}
            {(originX!==0||originZ!==0)&&(
              <line x1={hipPX} y1={hipPZ_px} x2={originPx.x} y2={originPx.y}
                    stroke="#a855f7" strokeWidth="1" strokeDasharray="4,3" opacity="0.5"/>
            )}

            {/* ── Moving axis arrows ── */}
            <defs>
              <marker id="arrX" markerWidth="7" markerHeight="7" refX="3.5" refY="3.5" orient="auto">
                <path d="M0,1 L6,3.5 L0,6 Z" fill="#22c55e"/>
              </marker>
              <marker id="arrZ" markerWidth="7" markerHeight="7" refX="3.5" refY="3.5" orient="auto">
                <path d="M0,1 L6,3.5 L0,6 Z" fill="#22c55e"/>
              </marker>
            </defs>
            <line x1={originPx.x} y1={originPx.y} x2={originPx.x+70} y2={originPx.y}
                  stroke="#22c55e" strokeWidth="1.8" markerEnd="url(#arrX)"/>
            <line x1={originPx.x} y1={originPx.y} x2={originPx.x} y2={originPx.y-70}
                  stroke="#22c55e" strokeWidth="1.8" markerEnd="url(#arrZ)"/>
            <text x={originPx.x+74} y={originPx.y+4}  fontSize="9" fill="#22c55e" fontWeight="bold">X</text>
            <text x={originPx.x+4}  y={originPx.y-73} fontSize="9" fill="#22c55e" fontWeight="bold">Z</text>
            <circle cx={originPx.x} cy={originPx.y} r={4} fill="#22c55e" opacity="0.9"/>
            <text x={originPx.x+10} y={originPx.y-6} fontSize="8" fill="#22c55e" letterSpacing="1">0,0,0</text>

            {/* Body segment lines */}
            {lines.map((ln,i)=>{ const a=sv(ln.a), b=sv(ln.b); return (
              <line key={i} x1={a.x} y1={a.y} x2={b.x} y2={b.y}
                    stroke={ln.color} strokeWidth={ln.w} strokeLinecap="round"/>
            );})}

            {/* Head */}
            <circle cx={headCenter.x} cy={headCenter.y} r={headR}
                    fill="#1a1a1a" stroke="#f59e0b" strokeWidth="5"/>

            {/* Joint dots */}
            {dots.map((d,i)=>{ const {x,y}=sv(d.p); return (
              <g key={i}>
                <circle cx={x} cy={y} r={d.r+3} fill="rgba(0,0,0,0.4)"/>
                <circle cx={x} cy={y} r={d.r}   fill={d.fill}/>
                {d.label&&<text x={x+10} y={y-4} fontSize="8" fill="#f59e0b" letterSpacing="1">{d.label}</text>}
              </g>
            );})}

            {/* Segment CoM dots */}
            {segs.map((s,i)=>{ const {x,y}=sv(s.com); return (
              <circle key={i} cx={x} cy={y} r={3}
                      fill="rgba(16,185,129,0.85)" stroke="rgba(16,185,129,0.3)" strokeWidth="1"/>
            );})}

            {/* Body CoG — mass-weighted centre of gravity */}
            {(()=>{ const g=sv(cog); return (<>
              <circle cx={g.x} cy={g.y} r={9}  fill="rgba(250,204,21,0.15)"/>
              <circle cx={g.x} cy={g.y} r={5}  fill="#facc15" stroke="#0d1425" strokeWidth="1.5"/>
              <line x1={g.x-11} y1={g.y} x2={g.x+11} y2={g.y} stroke="#facc15" strokeWidth="1" opacity="0.7"/>
              <line x1={g.x} y1={g.y-11} x2={g.x} y2={g.y+11} stroke="#facc15" strokeWidth="1" opacity="0.7"/>
              <text x={g.x+13} y={g.y+4} fontSize="8" fill="#facc15" fontFamily="Courier New,monospace">CoG</text>
            </>);})()}

            {/* Legend */}
            <circle cx={14} cy={SVG_H-22} r={3} fill="rgba(16,185,129,0.85)"/>
            <text   x={21}  y={SVG_H-18}  fontSize="8" fill="#4ade80" fontFamily="Courier New,monospace">CoM</text>
            <circle cx={62} cy={SVG_H-22} r={4} fill="#22c55e"/>
            <text   x={69}  y={SVG_H-18}  fontSize="8" fill="#22c55e" fontFamily="Courier New,monospace">Origin</text>
            <circle cx={118} cy={SVG_H-22} r={4} fill="#facc15"/>
            <text   x={125} y={SVG_H-18}  fontSize="8" fill="#facc15" fontFamily="Courier New,monospace">CoG</text>
          </svg>
          </div>

          {/* FRONT VIEW (Y–Z) */}
          <FrontView
            joints={joints} segs={segs} lateralY={lateralY}
            ang={ang} originZ={originZ} L={L} dlData={dlData}
            panel={panel} secTit={secTit}
            SCALE={SCALE} SVG_H={SVG_H} cog={cog}
          />

          </div>{/* end side-by-side */}

          {/* TOP VIEW (X–Y) — same width as Sagittal, X-grid aligned */}
          <TopView
            joints={joints} segs={segs} lateralY={lateralY}
            originX={originX} originY={originY} L={L} dlData={dlData}
            panel={panel} secTit={secTit} SCALE={SCALE} SVG_W={SVG_W} cog={cog}
          />

        </div>{/* end SVG column */}

        {/* ── Right column ── */}
        <div style={{ flex:1, minWidth:"280px", display:"flex", flexDirection:"column", gap:"14px" }}>

          {/* Anthropometric inputs */}
          <div style={panel}>
            <div style={secTit}>Anthropometric Inputs</div>

            {/* Gender toggle */}
            <div style={{ display:"flex", gap:"8px", marginBottom:"14px" }}>
              {[{v:'M',label:'♂  MALE'},{v:'F',label:'♀  FEMALE'}].map(g=>(
                <button key={g.v} onClick={()=>{
                  setGender(g.v);
                  if(g.v==='M'){ setMass(lbsToKg(165)); setHeightCm(Math.round(69*2.54)); }
                  else         { setMass(lbsToKg(137)); setHeightCm(Math.round(64*2.54)); }
                }} style={{
                  flex:1, padding:"7px 0", borderRadius:"5px", border:"none", cursor:"pointer",
                  fontFamily:"'Courier New',monospace", fontSize:"11px", letterSpacing:"2px", fontWeight:"bold",
                  background: gender===g.v ? (g.v==='M'?"#1e3a5f":"#3b1f6b") : "#0d1425",
                  color:       gender===g.v ? (g.v==='M'?"#60a5fa":"#c084fc") : "#374151",
                  border:      gender===g.v ? ("1px solid "+(g.v==='M'?"#3b82f6":"#a855f7")) : "1px solid #1e2d47",
                  transition:"all 0.15s"
                }}>{g.label}</button>
              ))}
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"14px" }}>
              {[
                ].map(()=>null)}
              {/* Weight */}
              <div>
                <div style={{ fontSize:"9px", color:"#64748b", letterSpacing:"1.8px", marginBottom:"6px", fontFamily:"'Courier New',monospace" }}>BODY WEIGHT</div>
                <div style={{ display:"flex", alignItems:"center", gap:"8px" }}>
                  <span style={{ fontSize:"8px", color:"#4b5a70", minWidth:"22px" }}>88</span>
                  <input type="range" min={88} max={396} step={1} value={Math.round(kgToLbs(mass))}
                         onChange={e=>setMass(lbsToKg(Number(e.target.value)))}
                         style={{ flex:1, accentColor:"#60a5fa" }}/>
                  <span style={{ fontSize:"8px", color:"#4b5a70", minWidth:"28px", textAlign:"right" }}>396</span>
                  <span style={{ color:"#e2e8f0", fontSize:"15px", fontWeight:"600", minWidth:"62px", textAlign:"right", fontFamily:"'Courier New',monospace" }}>
                    {kgToLbs(mass).toFixed(1)}<span style={{ fontSize:"10px", color:"#64748b" }}> lb</span>
                  </span>
                </div>
              </div>
              {/* Height */}
              <div>
                <div style={{ fontSize:"9px", color:"#64748b", letterSpacing:"1.8px", marginBottom:"6px", fontFamily:"'Courier New',monospace" }}>HEIGHT</div>
                <div style={{ display:"flex", alignItems:"center", gap:"8px" }}>
                  <span style={{ fontSize:"8px", color:"#4b5a70", minWidth:"22px" }}>4'7"</span>
                  <input type="range" min={Math.round(55*2.54)} max={Math.round(84*2.54)} step={1} value={Math.round(heightCm)}
                         onChange={e=>setHeightCm(Number(e.target.value))}
                         style={{ flex:1, accentColor:"#60a5fa" }}/>
                  <span style={{ fontSize:"8px", color:"#4b5a70", minWidth:"28px", textAlign:"right" }}>7'0"</span>
                  <span style={{ color:"#e2e8f0", fontSize:"15px", fontWeight:"600", minWidth:"62px", textAlign:"right", fontFamily:"'Courier New',monospace" }}>
                    {cmToFtIn(heightCm)}
                  </span>
                </div>
              </div>
              {[].map(()=>null)}
            </div>
            <div style={{ marginTop:"10px", padding:"8px", background:"#0d1425", borderRadius:"4px", fontSize:"10px", color:"#64748b" }}>
              BMI: <span style={{ color:"#10b981" }}>{(mass/(height*height)).toFixed(1)}</span>
              <span style={{ marginLeft:"16px" }}>Weight: <span style={{ color:"#10b981" }}>{kgToLbs(mass).toFixed(1)} lb</span></span>
              <span style={{ marginLeft:"16px" }}>CoG: <span style={{ color:"#facc15" }}>
                X={( cog.x * M_TO_IN).toFixed(1)}" &nbsp; Z={(cog.z * M_TO_IN).toFixed(1)}"
              </span></span>
              <span style={{ marginLeft:"16px", color: gender==='M'?"#60a5fa":"#c084fc" }}>
                Dataset: {gender==='M'?"De Leva male (n=100) · Dumas male (n=31)":"De Leva female (n=100) · Dumas female (n=24)"}
              </span>
            </div>
          </div>

          {/* Axis Origin sliders */}
          <div style={{ ...panel, border:"1px solid #166534" }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"12px" }}>
              <div style={{ ...secTit, marginBottom:0 }}>Axis Origin Position</div>
              <button onClick={()=>{ setOriginX(Math.round(cog.x*1000)/1000); setOriginY(0); setOriginZ(Math.round(cog.z*1000)/1000); }}
                style={{ padding:"4px 10px", borderRadius:"4px", border:"1px solid #22c55e",
                         background:"rgba(34,197,94,0.1)", color:"#22c55e", cursor:"pointer",
                         fontFamily:"'Courier New',monospace", fontSize:"8px", letterSpacing:"1px" }}>
                ⊕ ALIGN TO CoG
              </button>
            </div>
            <div style={{ fontSize:"9px", color:"#374151", marginBottom:"10px", lineHeight:"1.5" }}>
              Origin of X,Y,Z axes relative to hip joint. MOI computed about these axes.
            </div>
            {[
              { label:"X", val:originX, set:setOriginX, hint:"+ fwd", color:"#f87171" },
              { label:"Y", val:originY, set:setOriginY, hint:"+ right", color:"#60a5fa" },
              { label:"Z", val:originZ, set:setOriginZ, hint:"+ up",   color:"#4ade80" },
            ].map(inp=>(
              <div key={inp.label} style={{ marginBottom:"10px" }}>
                <div style={{ display:"flex", justifyContent:"space-between", marginBottom:"2px" }}>
                  <span style={{ fontSize:"10px", color:"#94a3b8", fontFamily:"'Courier New',monospace" }}>
                    <span style={{ color:inp.color, fontWeight:"bold" }}>{inp.label}</span>
                    <span style={hint}>{inp.hint}</span>
                  </span>
                  <span style={{ color:"#e2e8f0", fontSize:"15px", fontWeight:"600", minWidth:"62px",
                                 textAlign:"right", fontFamily:"'Courier New',monospace" }}>
                    {(inp.val*M_TO_IN)>=0?"+":""}{(inp.val*M_TO_IN).toFixed(1)}<span style={{ fontSize:"10px", color:"#64748b" }}> in</span>
                  </span>
                </div>
                <div style={{ display:"flex", alignItems:"center", gap:"6px" }}>
                  <span style={{ fontSize:"8px", color:"#4b5a70", minWidth:"24px" }}>-20"</span>
                  <input type="range" min={-0.50} max={0.50} step={0.01} value={inp.val}
                         onChange={e=>inp.set(Number(e.target.value))} style={{ flex:1, accentColor:"#60a5fa" }}/>
                  <span style={{ fontSize:"8px", color:"#4b5a70", minWidth:"24px", textAlign:"right" }}>+20"</span>
                </div>
              </div>
            ))}
            <div style={{ padding:"6px 10px", background:"#0a1f12", borderRadius:"4px", fontSize:"9px", color:"#4b5a70", display:"flex", justifyContent:"space-between" }}>
              <span>Hip at &nbsp;
                <span style={{ color:"#22c55e" }}>
                  ({(-originX*M_TO_IN).toFixed(1)}", {(-originY*M_TO_IN).toFixed(1)}", {(-originZ*M_TO_IN).toFixed(1)}")
                </span>
              </span>
              <button onClick={()=>{ setOriginX(0); setOriginY(0); setOriginZ(0); }}
                style={{ background:"none", border:"none", color:"#374151", cursor:"pointer",
                         fontFamily:"'Courier New',monospace", fontSize:"8px" }}>RESET</button>
            </div>
          </div>

          {/* Posture sliders */}
          <div style={panel}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"12px" }}>
              <div style={secTit} style={{ marginBottom:0 }}>Posture / Joint Angles</div>
            </div>

            {/* Preset buttons */}
            <div style={{ display:"flex", gap:"6px", flexWrap:"wrap", marginBottom:"14px" }}>
              {PRESETS.map(pr=>(
                <button key={pr.name} onClick={()=>{ setAng(pr.ang); setOriginX(0.061); setOriginY(0); setOriginZ(0.213); }} style={{
                  padding:"5px 10px", borderRadius:"4px", border:"1px solid #1e2d47",
                  background:"#0d1425", color:"#94a3b8", cursor:"pointer",
                  fontFamily:"'Courier New',monospace", fontSize:"8px", letterSpacing:"1.5px",
                  transition:"all 0.15s",
                }}
                onMouseEnter={e=>{ e.target.style.borderColor="#f59e0b"; e.target.style.color="#f59e0b"; }}
                onMouseLeave={e=>{ e.target.style.borderColor="#1e2d47"; e.target.style.color="#94a3b8"; }}
                >{pr.name}</button>
              ))}
            </div>

            {postureSliders.map(sl=>(
              <div key={sl.key} style={{ marginBottom:"10px" }}>
                <div style={{ display:"flex", justifyContent:"space-between", marginBottom:"2px" }}>
                  <span style={{ fontSize:"10px", color:"#94a3b8" }}>
                    {sl.label}<span style={hint}>{sl.hint}</span>
                  </span>
                  <span style={{ color:"#e2e8f0", fontSize:"15px", fontWeight:"600", minWidth:"50px", textAlign:"right", fontFamily:"'Courier New',monospace" }}>
                    {ang[sl.key].toFixed(0)}&deg;
                  </span>
                </div>
                <div style={{ display:"flex", alignItems:"center", gap:"6px" }}>
                  <span style={{ fontSize:"8px", color:"#4b5a70", minWidth:"22px" }}>{sl.min}</span>
                  <input type="range" min={sl.min} max={sl.max} step={1} value={ang[sl.key]}
                         onChange={e=>setAngle(sl.key,e.target.value)} style={{ flex:1, accentColor:"#60a5fa" }}/>
                  <span style={{ fontSize:"8px", color:"#4b5a70", minWidth:"22px", textAlign:"right" }}>{sl.max}</span>
                </div>
              </div>
            ))}

          </div>

          {/* MOI Results */}
          <div style={panel}>
            <div style={secTit}>MOI About Origin Axes [kg·m²]</div>
            {[
              { label:"ROLL",  axis:"I_xx", desc:"about X (fwd)",     dl:moiDL.Iroll,  du:moiDumas.Iroll,  av:moiAvg.Iroll,  color:"#f87171", bg:"rgba(248,113,113,0.06)" },
              { label:"PITCH", axis:"I_yy", desc:"about Y (lateral)", dl:moiDL.Ipitch, du:moiDumas.Ipitch, av:moiAvg.Ipitch, color:"#60a5fa", bg:"rgba(96,165,250,0.06)"  },
              { label:"YAW",   axis:"I_zz", desc:"about Z (up)",      dl:moiDL.Iyaw,   du:moiDumas.Iyaw,   av:moiAvg.Iyaw,   color:"#4ade80", bg:"rgba(74,222,128,0.06)"  },
            ].map(item=>{
              const maxBar = Math.max(item.dl, item.du, item.av, 0.001);
              const pctDiff = (Math.abs(item.dl-item.du)/item.av*100).toFixed(1);
              return (
                <div key={item.label} style={{ marginBottom:"10px", padding:"10px", borderRadius:"6px", background:item.bg, border:"1px solid "+item.color+"22" }}>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"baseline", marginBottom:"8px" }}>
                    <div>
                      <span style={{ color:item.color, fontSize:"11px", letterSpacing:"2px", fontWeight:"bold" }}>{item.label}</span>
                      <span style={{ color:"#374151", fontSize:"9px", marginLeft:"8px" }}>{item.axis} · {item.desc}</span>
                    </div>
                    <span style={{ fontSize:"8px", color:"#374151" }}>spread: <span style={{ color:"#f59e0b" }}>{pctDiff}%</span></span>
                  </div>
                  <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:"5px", marginBottom:"6px" }}>
                    {[
                      { src:"De Leva '96", val:item.dl, col:"#94a3b8" },
                      { src:"Dumas '07",   val:item.du, col:"#a78bfa" },
                      { src:"Wtd. Avg",    val:item.av, col:item.color },
                    ].map(v=>(
                      <div key={v.src} style={{ background:"#080f1e", borderRadius:"4px", padding:"6px", textAlign:"center" }}>
                        <div style={{ fontSize:"8px", color:"#374151", marginBottom:"2px" }}>{v.src}</div>
                        <div style={{ color:v.col, fontSize:"14px", fontWeight:"bold", fontFamily:"'Courier New',monospace" }}>{v.val.toFixed(2)}</div>
                        <div style={{ fontSize:"7px", color:"#374151" }}>kg·m²</div>
                      </div>
                    ))}
                  </div>
                  {[{lbl:"DL",val:item.dl,col:"#64748b"},{lbl:"Du",val:item.du,col:"#a78bfa"},{lbl:"Av",val:item.av,col:item.color}].map(b=>(
                    <div key={b.lbl} style={{ display:"flex", alignItems:"center", gap:"5px", marginBottom:"2px" }}>
                      <span style={{ fontSize:"7px", color:"#374151", minWidth:"14px" }}>{b.lbl}</span>
                      <div style={{ flex:1, background:"#0d1425", height:"3px", borderRadius:"2px" }}>
                        <div style={{ background:b.col, height:"3px", borderRadius:"2px", width:(b.val/maxBar*100).toFixed(1)+"%", transition:"width 0.12s" }}/>
                      </div>
                    </div>
                  ))}
                </div>
              );
            })}
            <div style={{ fontSize:"9px", color:"#374151", lineHeight:"1.6", marginTop:"4px" }}>
              Wtd. Avg = (5×De Leva + 2×Dumas) / 7 &nbsp;·&nbsp; weights reflect sample sizes n=100 vs n=31.
              Use <span style={{ color:"#f59e0b" }}>Wtd. Avg</span> as M1080 RLS warm-start.
            </div>
          </div>
        </div>
      </div>

      {/* ── Segment Breakdown ── */}
      <div style={{ ...panel, marginTop:"16px" }}>
        <div style={secTit}>Segment Contribution Breakdown</div>

        {/* Column header row */}
        <div style={{ display:"grid", gridTemplateColumns:"1fr 52px 52px 52px 44px", gap:"0", marginBottom:"4px",
                      padding:"4px 10px", borderBottom:"1px solid #1e2d47" }}>
          <span style={{ fontSize:"8px", color:"#4b5a70", letterSpacing:"1px" }}>SEGMENT</span>
          <span style={{ fontSize:"8px", color:"#f87171", textAlign:"right", letterSpacing:"0.5px" }}>I_xx</span>
          <span style={{ fontSize:"8px", color:"#60a5fa", textAlign:"right", letterSpacing:"0.5px" }}>I_yy</span>
          <span style={{ fontSize:"8px", color:"#4ade80", textAlign:"right", letterSpacing:"0.5px" }}>I_zz</span>
          <span style={{ fontSize:"8px", color:"#4b5a70", textAlign:"right", letterSpacing:"0.5px" }}>MASS</span>
        </div>
        <div style={{ fontSize:"7px", color:"#374151", marginBottom:"8px", padding:"0 10px" }}>
          kg·m² &nbsp;|&nbsp; xx=Roll · yy=Pitch · zz=Yaw &nbsp;|&nbsp; De Leva (1996) reference
        </div>

        {/* Segment rows */}
        {moi.breakdown.map((s,i)=>{
          const pctRoll  = moi.Iroll  > 0 ? s.ir/moi.Iroll*100  : 0;
          const pctPitch = moi.Ipitch > 0 ? s.ip/moi.Ipitch*100 : 0;
          const maxPct   = Math.max(pctRoll, pctPitch, 0.1);
          return (
            <div key={s.id} style={{
              display:"grid", gridTemplateColumns:"1fr 52px 52px 52px 44px",
              padding:"5px 10px", borderBottom:"1px solid #080f1e",
              background: i%2===0 ? "transparent" : "rgba(255,255,255,0.015)",
              alignItems:"center",
            }}>
              {/* Segment name + bar */}
              <div>

        // ── Analytical derivation of I = m·(A·H² + B·H + C) per axis ──────────
        // Since all segment CoM positions scale with H (com = H·f(angles)),
        // and lateral offsets y = H·Y_FRAC, the full MOI expands to a
        // quadratic in H with mass M factored out:
        //
        //   I_axis = M · ( A·H²  +  B·H  +  C )
        //
        // where A, B, C are pure functions of posture angles and origin offset.
        // B and C vanish when origin is at hip (originX=originZ=0).
        //
        // Derivation per segment s:
        //   com_s = (H·fx_s, H·fz_s),  y_s = H·yf_s
        //   dx_s  = H·fx_s - originX,  dz_s = H·fz_s - originZ
        //   Iloc_s = (k_s·lf_s·H)²·mf_s·M
        //
        //   Roll  (about X): d² = dz_s² + y_s²
        //   Pitch (about Y): d² = dx_s² + dz_s²
        //   Yaw   (about Z): d² = dx_s² + y_s²

        let Ar=0, Br=0, Cr=0;  // Roll
        let Ap=0, Bp=0, Cp=0;  // Pitch
        let Ay=0, By=0, Cy=0;  // Yaw

        for (const seg of segs) {
          const fx  = seg.com.x / height;   // normalised x-position (com.x = H·fx)
          const fz  = seg.com.z / height;   // normalised z-position
          const yf  = seg.y     / height;   // normalised lateral half-offset
          const mf  = seg.m / mass;         // total mass fraction (accounts for n)
          const kl2 = (seg.k * (seg.L / height)) ** 2;  // (k·lf)²

          // Roll (X): d² = (H·fz - oZ)² + (H·yf)²
          Ar += seg.n * mf * (kl2 + fz*fz + yf*yf);
          Br += seg.n * mf * (-2*fz*originZ);
          Cr += seg.n * mf * (originZ*originZ);

          // Pitch (Y): d² = (H·fx - oX)² + (H·fz - oZ)²
          Ap += seg.n * mf * (kl2 + fx*fx + fz*fz);
          Bp += seg.n * mf * (-2*(fx*originX + fz*originZ));
          Cp += seg.n * mf * (originX*originX + originZ*originZ);

          // Yaw (Z): d² = (H·fx - oX)² + (H·yf)²
          Ay += seg.n * mf * (kl2 + fx*fx + yf*yf);
          By += seg.n * mf * (-2*fx*originX);
          Cy += seg.n * mf * (originX*originX);
        }

          { label:"YAW",   sym:"I_zz", desc:"about Z (up)",      color:"#4ade80",

                <span style={{ color:"#94a3b8" }}> · H²</span>
                { !atHip && <><span style={{ color:"#94a3b8" }}>  +  </span>
                  <span style={{ color:"#a78bfa", fontWeight:"bold" }}>B</span>
                  <span style={{ color:"#94a3b8" }}> · H</span>
                  <span style={{ color:"#94a3b8" }}>  +  </span>
                  <span style={{ color:"#fb923c", fontWeight:"bold" }}>C</span></> }
                <span style={{ color:"#94a3b8" }}> )</span>
              </div>
              <div style={{ fontSize:"10px", color:"#374151", marginTop:"6px", lineHeight:"1.7" }}>

                { !atHip
                  ? " · A, B, C = posture & origin coefficients [m², m, 1]"

              </div>
            </div>

              {axes.map(ax => {
                // Verify: m·(A·H²+B·H+C) should match computed moi value
                const check = mass * (ax.A*height*height + ax.B*height + ax.C);

                  <div key={ax.label} style={{ background:"#0d1425", borderRadius:"8px",
                      padding:"14px", border:"1px solid "+ax.color+"33" }}>

                    {/* Axis label */}

                    </div>
                  </div>
                );

                Small differences validate that both datasets are consistent for normal-BMI adults.
              </div>
            </div>

            {/* Column key */}
            <div style={{ padding:"8px 12px", background:"#0d1425", borderRadius:"4px", fontSize:"9px", color:"#374151", lineHeight:"1.8" }}>
              <strong style={{ color:"#64748b" }}>Column key:</strong>
              &nbsp; mf = seg mass / body mass &nbsp;|&nbsp;
              lf = seg length / body height &nbsp;|&nbsp;
              cf = CoM from proximal end / seg length &nbsp;|&nbsp;
              Rg/L = transverse radius of gyration / seg length &nbsp;|&nbsp;
              I_local = (Rg/L · L)² · m
            </div>
          </div>
        )}
      </div>

      {/* Footer */}
      <div style={{ marginTop:"12px", display:"flex", justifyContent:"space-between", flexWrap:"wrap", gap:"6px" }}>
        <div style={{ fontSize:"9px", color:"#1e2d47" }}>[1] De Leva (1996) J Biomech 29(9):1223–30 &nbsp;|&nbsp; [2] Dumas et al. (2007) J Biomech 40(3):543–53</div>
        <div style={{ fontSize:"9px", color:"#1e2d47" }}>Frame: X=fwd · Y=lateral · Z=up (RH) · Origin offset from greater trochanter</div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
